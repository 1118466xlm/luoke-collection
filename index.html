<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#7EC8A3">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="洛克收集簿">
<title>洛克收集簿</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --mint:#7EC8A3;--mint-dk:#5DAB86;--sky:#8EC5E2;--pink:#F4B5B5;--peach:#FCD5B5;--lavender:#D5C6E0;--butter:#FFF1C1;
  --bg:#FFFBF7;--surface:#FFF;--text:#5D576B;--text2:#A098AE;
  --border:#EBE3DA;--shadow:0 2px 10px rgba(0,0,0,.04);
  --radius:12px;--safe-b:env(safe-area-inset-bottom,16px);--safe-t:env(safe-area-inset-top,0px)
}
html,body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  background:var(--bg);color:var(--text);height:100%;overflow:hidden;
  -webkit-tap-highlight-color:transparent;user-select:none
}
#app{height:100%;display:flex;flex-direction:column;max-width:640px;margin:0 auto;position:relative}
.header{background:var(--mint);color:#fff;padding:10px 16px;padding-top:max(10px,var(--safe-t));flex-shrink:0;position:relative;z-index:2}
.header h1{font-size:19px;text-align:center;font-weight:700;letter-spacing:2px}
.tabs{display:flex;padding:8px 14px 0;gap:6px;flex-shrink:0;background:var(--mint)}
.tab{flex:1;padding:9px 0;border:none;border-radius:10px 10px 0 0;background:rgba(255,255,255,.2);color:rgba(255,255,255,.75);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;font-weight:500;transition:all .15s}
.tab.active{background:var(--bg);color:var(--text);font-weight:700}
.tab svg{width:18px;height:18px}
.search-bar{padding:8px 14px;flex-shrink:0;display:flex;gap:6px;background:var(--bg)}
.search-bar input{flex:1;padding:10px 16px;border:2px solid var(--border);border-radius:24px;font-size:14px;background:var(--surface);outline:none;color:var(--text)}
.search-bar input:focus{border-color:var(--mint)}
.search-bar input::placeholder{color:var(--text2)}
.search-bar .btn-clear{display:none;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 6px}
.search-bar.searching .btn-clear{display:inline}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
/* carousel */
.carousel-wrap{padding:10px 10px 0}
.carousel-inner{width:100%;height:180px;border-radius:var(--radius);overflow:hidden;background:#1a1a2e;position:relative}
.carousel-inner canvas{width:100%;height:100%;display:block;transition:opacity .5s}
.carousel-inner .ci-overlay{position:absolute;inset:0;border-radius:var(--radius);background:linear-gradient(transparent 55%,rgba(0,0,0,.35));display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;pointer-events:none}
.carousel-inner .ci-row{display:flex;align-items:center;gap:8px}
.carousel-inner .ci-row>*{pointer-events:auto}
.carousel-inner .ci-label{color:#fff;font-size:11px;letter-spacing:1px;opacity:.7;flex:1}
.carousel-inner .ci-dots{display:flex;gap:5px}
.carousel-inner .ci-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);border:none;cursor:pointer;padding:0;transition:all .2s}
.carousel-inner .ci-dot.active{background:#fff;transform:scale(1.5)}
.carousel-inner .ci-btns{display:flex;gap:4px}
.carousel-inner .ci-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:12px;cursor:pointer}
/* gallery */
.gallery{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.gallery .card{border-radius:var(--radius);background:var(--surface);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s}
.gallery .card:active{transform:scale(.97)}
.gallery .card .img-box{width:100%;height:160px;overflow:hidden;background:#F5F0EB}
.gallery .card .img-box img{width:100%;height:100%;object-fit:cover;display:block}
.gallery .card .info{padding:8px 10px;display:flex;gap:5px;flex-wrap:wrap}
.gallery .card .chip{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:600}
.export-row{display:flex;gap:10px;justify-content:center;padding:8px 10px calc(8px + var(--safe-b))}
.export-row button{padding:8px 20px;border-radius:20px;border:2px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;color:var(--text)}
/* fashion (placeholder) */
.fashion-placeholder{text-align:center;padding:80px 20px;color:var(--text2)}
.fashion-placeholder svg{margin-bottom:16px;opacity:.6}
.fashion-placeholder p{font-size:15px;line-height:1.7}
/* slot-gallery (for drill-down from fashion in future) */
.slot-gallery{padding:6px}
.slot-gallery .back-btn{display:flex;align-items:center;gap:6px;padding:8px 0;margin-bottom:6px;background:none;border:none;color:var(--mint-dk);font-size:15px;cursor:pointer;font-weight:600}
.slot-gallery .gallery-title{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--text)}
/* cart */
.cart-wrap{padding:10px}
.cart-add-bar{display:flex;gap:8px;margin-bottom:10px}
.cart-add-bar button{padding:8px 16px;border-radius:20px;border:none;background:var(--mint);color:#fff;font-size:13px;cursor:pointer;font-weight:600}
.cart-list{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cart-item{border-radius:var(--radius);background:var(--surface);overflow:hidden;box-shadow:var(--shadow)}
.cart-item .ci-img{width:100%;height:140px;overflow:hidden;background:#F5F0EB;position:relative;display:flex;align-items:center;justify-content:center}
.cart-item .ci-img img{width:100%;height:100%;object-fit:cover;display:block}
.cart-item .ci-img .ci-placeholder{font-size:40px;color:#D5CCC0}
.cart-item .ci-img-tap{cursor:pointer;position:relative}
.cart-item .ci-img-tap::after{content:'+';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:rgba(0,0,0,.15);pointer-events:none}
.ci-quality-toggle{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;margin-bottom:6px;border:none;cursor:pointer}
.cart-item .ci-info{padding:10px}
.cart-item .ci-name{font-size:13px;font-weight:700;margin-bottom:4px}
.cart-item .ci-quality{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;margin-bottom:6px}
.ci-quality-gold{background:#FFF8D6;color:#B8860B}
.ci-quality-purple{background:#F0E0F5;color:#7D3C98}
.cart-item .ci-buy{width:100%;padding:8px;border:none;border-radius:8px;background:var(--mint);color:#fff;font-size:12px;cursor:pointer;font-weight:600}
.cart-item .ci-buy.in-cart{background:#F5EFE8;color:var(--text2)}
/* cart sidebar - aligned with FAB */
.cart-sidebar{position:fixed;right:20px;bottom:calc(88px + var(--safe-b));z-index:21}
.cart-badge{width:48px;height:48px;border-radius:50%;border:none;background:var(--sky);color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 14px rgba(142,197,226,.35);position:relative;display:flex;align-items:center;justify-content:center}
.cart-badge .cb-count{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;background:var(--pink);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cart-badge svg{width:22px;height:22px}
.cart-panel{display:none;position:fixed;inset:0;z-index:75;background:var(--bg);flex-direction:column;max-width:640px;margin:0 auto}
.cart-panel.active{display:flex}
.cart-panel-header{background:var(--mint);color:#fff;padding:10px 16px;padding-top:max(10px,var(--safe-t));display:flex;align-items:center;gap:10px;flex-shrink:0}
.cart-panel-header button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer}
.cart-panel-header h2{font-size:18px;flex:1}
.cart-panel-body{flex:1;overflow-y:auto;padding:10px}
.cart-panel-body .cart-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cart-panel-body .cart-row img{width:48px;height:48px;object-fit:cover;border-radius:8px;background:#F5F0EB}
.cart-panel-body .cart-row .cr-name{flex:1;font-size:14px;font-weight:600}
.cart-panel-body .cart-row .cr-del{background:none;border:none;color:var(--pink);font-size:18px;cursor:pointer}
.cart-panel-footer{padding:10px 16px calc(10px + var(--safe-b));border-top:1px solid var(--border);text-align:center;color:var(--text2);font-size:13px}
.form-mini{display:flex;flex-direction:column;gap:8px}
.form-mini input,.form-mini select{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-size:14px;background:var(--surface);outline:none;color:var(--text)}
.form-mini input:focus,.form-mini select:focus{border-color:var(--mint)}
.form-mini .btn-row{display:flex;gap:8px}
.form-mini .btn-row button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;cursor:pointer;font-weight:600}
.form-mini .btn-row .btn-primary{background:var(--mint);color:#fff}
.form-mini .btn-row .btn-secondary{background:#F0EBE6;color:var(--text)}
/* detail */
.detail-overlay{position:fixed;inset:0;z-index:50;background:rgba(25,15,15,.96);display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail-overlay.active{display:flex}
.detail-close{position:sticky;top:max(10px,var(--safe-t));align-self:flex-end;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:18px;cursor:pointer;z-index:2;margin:10px}
.detail-img{width:100%;display:block}
.detail-info{padding:16px;color:#fff;overflow:visible}
.detail-info .date{font-size:12px;color:var(--peach);margin-bottom:14px}
.pieces{display:flex;flex-direction:column;gap:8px}
.piece-card{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;border-left:3px solid var(--mint)}
.piece-card .p-set{font-size:14px;font-weight:700;color:var(--butter)}
.piece-card .p-slot{font-size:13px;color:var(--peach)}
.detail-actions{display:flex;gap:10px;padding:0 16px 24px}
.detail-actions button{flex:1;padding:13px;border-radius:12px;border:none;font-size:15px;cursor:pointer;font-weight:600}
.btn-edit{background:var(--mint);color:#fff}
.btn-delete{background:rgba(255,255,255,.08);color:var(--pink)}
/* form */
.form-overlay{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;overflow-y:auto}
.form-overlay.active{display:flex}
.form-header{background:var(--mint);color:#fff;padding:10px 16px;padding-top:max(10px,var(--safe-t));flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.form-header button{background:none;border:none;color:#fff;font-size:16px;cursor:pointer}
.form-header span{font-weight:700;font-size:16px}
.form-body{flex:1;padding:16px;overflow-y:auto}
.form-body label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin:14px 0 6px;text-transform:uppercase;letter-spacing:.5px}
.form-body label:first-child{margin-top:0}
.form-body input[type=text],.form-body select{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:15px;background:var(--surface);outline:none;color:var(--text)}
.form-body input[type=text]:focus,.form-body select:focus{border-color:var(--mint)}
.form-body input[type=text]::placeholder{color:var(--text2)}
.form-body input[type=file]{margin-top:8px;font-size:14px;color:var(--text)}
.img-preview{width:100%;max-height:200px;object-fit:contain;border-radius:var(--radius);margin-top:8px;background:#F5F0EB;display:none}
.piece-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:10px;background:var(--surface);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.piece-row select{width:96px;flex-shrink:0;font-size:14px;padding:10px 6px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);outline:none}
.piece-row select:focus{border-color:var(--mint)}
.piece-row input{flex:1;min-width:60px;font-size:14px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);outline:none}
.piece-row input:focus{border-color:var(--mint)}
.piece-row input::placeholder{color:var(--text2)}
.piece-row .btn-rm{background:none;border:none;color:var(--pink);font-size:20px;cursor:pointer;padding:2px 6px;flex-shrink:0}
.ac-wrap{position:relative;flex:1;min-width:60px}
.ac-dd{display:none;position:absolute;top:100%;left:0;right:0;z-index:10;background:var(--surface);border:2px solid var(--border);border-radius:10px;max-height:150px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.ac-dd.show{display:block}
.ac-dd .ac-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #F5EFE8}
.ac-dd .ac-item:last-child{border-bottom:none}
.ac-dd .ac-item:active{background:#FFF9F5}
.btn-add-piece{display:none;width:100%;padding:12px;border:2px dashed #E5DBD0;border-radius:12px;background:none;color:var(--mint-dk);font-size:14px;cursor:pointer;margin-top:8px;font-weight:600}
.btn-save{width:100%;padding:15px;background:var(--mint);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;margin-top:18px;margin-bottom:var(--safe-b)}
/* crop */
.crop-overlay{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.9);display:none;flex-direction:column;align-items:center;justify-content:center}
.crop-overlay.active{display:flex}
.crop-overlay canvas{max-width:100%;max-height:60vh;touch-action:none}
.crop-tools{display:flex;gap:10px;margin-top:16px}
.crop-tools button{padding:10px 18px;border-radius:20px;border:none;font-size:14px;cursor:pointer;font-weight:600}
.crop-btn-land{background:var(--mint);color:#fff}
.crop-btn-port{background:var(--sky);color:var(--text)}
.crop-btn-done{background:#fff;color:var(--text)}
/* fab - aligned with cart badge */
.fab{position:fixed;right:20px;bottom:calc(20px + var(--safe-b));width:56px;height:56px;border-radius:50%;border:none;background:var(--mint);color:#fff;font-size:28px;box-shadow:0 6px 18px rgba(126,200,163,.3);cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.fab:active{transform:scale(.9)}
.fab svg{width:26px;height:26px}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .empty-icon{font-size:60px;margin-bottom:16px}
.empty p{margin-bottom:6px;font-size:15px;line-height:1.7}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.install-banner{display:none;position:fixed;bottom:calc(84px + var(--safe-b));left:16px;right:16px;background:var(--surface);border-radius:var(--radius);box-shadow:0 6px 20px rgba(0,0,0,.08);padding:16px;z-index:30;align-items:center;gap:12px;border:2px solid #E0F0E8}
.install-banner.show{display:flex}
.install-banner .ib-text{flex:1;font-size:14px}
.install-banner button{padding:9px 18px;border-radius:20px;border:none;background:var(--mint);color:#fff;font-size:14px;cursor:pointer;white-space:nowrap;font-weight:600}
.install-banner .ib-close{background:none;color:var(--text2);font-size:20px;padding:4px}
.confirm-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center}
.confirm-overlay.active{display:flex}
.confirm-dialog{background:var(--surface);border-radius:18px;padding:24px;max-width:300px;width:90%;text-align:center}
.confirm-dialog p{margin-bottom:20px;font-size:15px;line-height:1.5;color:var(--text)}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:11px;border-radius:12px;border:none;font-size:15px;cursor:pointer;font-weight:600}
.btn-cancel{background:#F0EBE6;color:var(--text)}
.btn-ok{background:var(--pink);color:#fff}
</style>
</head>
<body>

<div id="app">
  <div class="header"><h1>洛克收集簿</h1></div>
  <div class="tabs">
    <button class="tab active" data-tab="home">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页
    </button>
    <button class="tab" data-tab="fashion">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="8" height="8" rx="1"/><rect x="14" y="3" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="8" height="8" rx="1"/></svg>时装分组
    </button>
    <button class="tab" data-tab="cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>购物车
    </button>
  </div>
  <div class="search-bar" id="searchBar">
    <input type="text" id="searchInput" placeholder="搜索服装名…">
    <button class="btn-clear" id="btnClearSearch">✕</button>
  </div>
  <div class="main" id="main"></div>
  <button class="fab" id="fab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
</div>

<!-- cart sidebar badge -->
<div class="cart-sidebar" id="cartSidebar">
  <button class="cart-badge" id="cartBadge">
    <span class="cb-count" id="cartCount">0</span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>
  </button>
</div>
<div class="cart-panel" id="cartPanel">
  <div class="cart-panel-header"><button id="cartPanelBack">← 返回</button><h2>购物车</h2></div>
  <div class="cart-panel-body" id="cartPanelBody"></div>
  <div class="cart-panel-footer">继续浏览时装吧 ✨</div>
</div>

<!-- detail -->
<div class="detail-overlay" id="detailOverlay">
  <button class="detail-close" id="detailClose">✕</button>
  <img class="detail-img" id="detailImg" src="" alt="">
  <div class="detail-info"><div class="date" id="detailDate"></div><div class="pieces" id="detailPieces"></div></div>
  <div class="detail-actions"><button class="btn-edit" id="detailEdit">✏️ 编辑</button><button class="btn-delete" id="detailDelete">🗑 删除</button></div>
</div>

<!-- form -->
<div class="form-overlay" id="formOverlay">
  <div class="form-header"><button id="formCancel">取消</button><span id="formTitle">添加搭配</span><button id="formSubmit" style="font-weight:700">保存</button></div>
  <div class="form-body">
    <label>📷 游戏截图</label>
    <input type="file" accept="image/*" id="formImageInput">
    <img class="img-preview" id="formImgPreview" src="" alt="">
    <label>🧩 部件列表</label>
    <div id="formPieces"></div>
    <button class="btn-add-piece" id="btnAddPiece">+ 添加部件</button>
    <button class="btn-save" id="btnSaveForm">💾 保存搭配</button>
  </div>
</div>

<div class="form-overlay" id="pikaFormOverlay">
  <div class="form-header"><button id="pikaFormCancel">取消</button><span>添加皮卡时装</span><button id="pikaFormSubmit" style="font-weight:700">添加</button></div>
  <div class="form-body">
    <div class="form-mini"><label>时装名称</label><input type="text" id="pikaName" placeholder="如: 草莓甜心"><label>品质</label><select id="pikaQuality"><option value="金色">金色</option><option value="紫色">紫色</option></select><label>图片（可选）</label><input type="file" accept="image/*" id="pikaImage"><button style="width:100%;padding:14px;background:var(--mint);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;margin-top:10px;cursor:pointer" id="pikaDoAdd">💾 添加到列表</button></div>
  </div>
</div>

<div class="crop-overlay" id="cropOverlay"><canvas id="cropCanvas"></canvas>

function buildSlides(){var slides=[],land=[],port=[];all.forEach(function(o){var iw=o.imageWidth,ih=o.imageHeight;if(iw&&ih){if(iw>=ih)land.push(o);else port.push(o)}else{land.push(o)}});land.forEach(function(o){slides.push({t:'s',items:[o]})});port.sort(function(){return Math.random()-.5});for(var i=0;i<port.length;i+=2){if(i+1<port.length)slides.push({t:'p',items:[port[i],port[i+1]]});else slides.push({t:'s',items:[port[i]]})}slides.sort(function(){return Math.random()-.5});return slides}

  else{html+='<div class="gallery">';outfits.forEach(function(o){var sns=[];o.pieces.forEach(function(p){if(p.setName&&sns.indexOf(p.setName)===-1)sns.push(p.setName)});var chips='';sns.forEach(function(s){var c=tc(s);chips+='<span class="chip" style="background:'+c.bg+';color:'+c.tx+'">'+esc(s)+'</span>'});html+='<div class="card" data-id="'+o.id+'"><div class="img-box"><img src="'+bu(o.thumbnail)+'" alt="" loading="lazy"></div><div class="info">'+chips+'</div></div>'});html+='</div>';html+='<div class="export-row"><button id="btnExport">📤 导出数据</button><button id="btnImport">📥 导入数据</button></div>'}
  main.innerHTML=html;

// ═══════ RENDER: CART ═══════
function cartCount(){return cart.length}
function updateCartBadge(){$('#cartCount').textContent=cartCount()}
function isInCart(pid){return cart.some(function(x){return x.id===pid})}
function renderCart(){
  $('#fab').style.display='none';$('#cartSidebar').style.display='none';
  var cw=document.getElementById('cw');if(cw)cw.remove();var main=$('#main'),html='<div class="cart-wrap">';
  html+='<div class="cart-add-bar"><button id="btnAddPika">+ 添加皮卡时装</button><span style="font-size:12px;color:var(--text2);margin-left:auto">共 '+pika.length+' 款</span></div>';
  html+='<div class="cart-list">';
  pika.forEach(function(p){
    var inCart=isInCart(p.id);
    html+='<div class="cart-item"><div class="ci-img'+(p.imageBlob?'':' ci-img-tap')+'" data-pid="'+p.id+'">';
    if(p.imageBlob){html+='<img src="'+bu(p.imageBlob)+'" alt="">'}
    else{html+='<span class="ci-placeholder">'+SLOT_ICONS['上装']+'</span>'}
    html+='</div><div class="ci-info"><div class="ci-name">'+esc(p.name)+'</div>';
    html+='<button class="ci-quality-toggle '+(p.quality==='金色'?'ci-quality-gold':'ci-quality-purple')+'" data-pid="'+p.id+'">'+(p.quality==='金色'?'✦ 金色':'◇ 紫色')+'</button>';
    html+='<button class="ci-buy'+(inCart?' in-cart':'')+'" data-pid="'+p.id+'">'+(inCart?'✓ 已加入':'+ 加入购物车')+'</button>';
    html+='</div></div>';
  });
  html+='</div></div>';main.innerHTML=html;
  document.getElementById('btnAddPika').onclick=function(){$('#pikaFormOverlay').classList.add('active')};
  main.querySelectorAll('.ci-buy').forEach(function(btn){btn.onclick=function(){toggleCart(this.dataset.pid,this)}});
  // Click placeholder to add image
  main.querySelectorAll('.ci-img-tap').forEach(function(el){el.onclick=function(){var pid=this.dataset.pid;var inp=document.createElement('input');inp.type='file';inp.accept='image/*';inp.addEventListener('change',function(){var f=this.files[0];if(!f)return;cropPikaAuto(f).then(function(cropped){mkThumb(cropped,400).then(function(tb){var p=pika.find(function(x){return x.id===pid});if(p){p.imageBlob=tb;dbPut('pika',p);renderCart();toast('图片已添加')}})})});inp.click()}});
  // Quality toggle
  main.querySelectorAll('.ci-quality-toggle').forEach(function(el){el.onclick=function(){var pid=this.dataset.pid;var p=pika.find(function(x){return x.id===pid});if(!p)return;p.quality=p.quality==='金色'?'紫色':'金色';dbPut('pika',p);renderCart();toast('已切换为'+(p.quality==='金色'?'金色 ✦':'紫色 ◇'))}});
}
function toggleCart(pid,btn){
  if(isInCart(pid)){cart=cart.filter(function(x){return x.id!==pid});dbDel('pikaCart',pid);if(btn){btn.textContent='+ 加入购物车';btn.classList.remove('in-cart')}}
  else{var p=pika.find(function(x){return x.id===pid});if(!p)return;var ci={id:p.id,name:p.name,quality:p.quality,imageBlob:p.imageBlob||null};cart.push(ci);dbPut('pikaCart',ci);if(btn){btn.textContent='✓ 已加入';btn.classList.add('in-cart')}}
  updateCartBadge();
}

// ═══════ CART PANEL ═══════
function openCartPanel(){var body=$('#cartPanelBody'),html='';if(!cart.length){html='<div class="empty"><p>购物车是空的</p><p>去购物车标签页添加皮卡时装吧</p></div>'}else{cart.forEach(function(c){html+='<div class="cart-row">';if(c.imageBlob)html+='<img src="'+bu(c.imageBlob)+'" alt="">';else html+='<span style="font-size:28px;width:48px;text-align:center;color:#D5CCC0">👔</span>';html+='<span class="cr-name">'+esc(c.name)+' <span style="font-size:11px;color:var(--text2)">'+(c.quality==='金色'?'✦金色':'◇紫色')+'</span></span>';html+='<button class="cr-del" data-pid="'+c.id+'">🗑</button></div>'})}body.innerHTML=html;body.querySelectorAll('.cr-del').forEach(function(b){b.onclick=function(){cart=cart.filter(function(x){return x.id!==b.dataset.pid});dbDel('pikaCart',b.dataset.pid);updateCartBadge();openCartPanel()}});$('#cartPanel').classList.add('active')}
function closeCartPanel(){$('#cartPanel').classList.remove('active')}

// ═══════ ADD PIKA ═══════
// ═══════ PIKA AUTO-CROP (3:4 centered) ═══════
function cropPikaAuto(blob){return new Promise(function(ok){var img=new Image();img.onload=function(){var tw=img.width,th=img.height,ratio=3/4;var cw,ch;if(tw/th>ratio){ch=th;cw=th*ratio}else{cw=tw;ch=tw/ratio}var cx=(tw-cw)/2,cy=(th-ch)/2;var c=document.createElement('canvas');c.width=cw;c.height=ch;c.getContext('2d').drawImage(img,cx,cy,cw,ch,0,0,cw,ch);c.toBlob(function(b){ok(b)},'image/jpeg',.9)};img.src=bu(blob)})}

function addPikaFashion(){
  var name=$('#pikaName').value.trim(),quality=$('#pikaQuality').value;if(!name){toast('请输入时装名称');return}
  var id='p'+uid(),obj={id:id,name:name,quality:quality,imageBlob:null};
  var fi=$('#pikaImage');if(fi.files&&fi.files[0]){cropPikaAuto(fi.files[0]).then(function(cropped){mkThumb(cropped,400).then(function(tb){obj.imageBlob=tb;dbPut('pika',obj).then(function(){pika.push(obj);$('#pikaFormOverlay').classList.remove('active');$('#pikaName').value='';$('#pikaImage').value='';renderCart();toast('图片已自动裁剪添加')})})})}
  else{dbPut('pika',obj).then(function(){pika.push(obj);$('#pikaFormOverlay').classList.remove('active');$('#pikaName').value='';renderCart();toast('已添加')})}
}

// ═══════ DETAIL ═══════
function showDetail(id){var o=all.find(function(x){return x.id===id});if(!o)return;st.did=id;$('#detailImg').src=bu(o.image);$('#detailDate').textContent='📅 添加于 '+fd(o.createdAt);var html='';o.pieces.forEach(function(p){var icon=SLOT_ICONS[p.slot]||'';html+='<div class="piece-card"><span style="display:flex;align-items:center;width:32px;height:32px">'+icon+'</span><div><div class="p-set">'+esc(p.setName||'未分组')+'</div><div class="p-slot">'+esc(p.slot)+'</div></div></div>'});$('#detailPieces').innerHTML=html;$('#detailOverlay').classList.add('active');document.body.style.overflow='hidden'}
function closeDetail(){$('#detailOverlay').classList.remove('active');document.body.style.overflow='';st.did=null}

// ═══════ FORM ═══════
function openAdd(){st.eid=null;$('#formTitle').textContent='添加搭配';$('#formImageInput').value='';$('#formImgPreview').style.display='none';$('#formPieces').innerHTML='';addRow();$('#btnAddPiece').style.display='none';$('#formOverlay').classList.add('active');document.body.style.overflow='hidden'}
function openEdit(id){var o=all.find(function(x){return x.id===id});if(!o)return;st.eid=id;$('#formTitle').textContent='编辑搭配';$('#formImageInput').value='';if(o.image){$('#formImgPreview').src=bu(o.image);$('#formImgPreview').style.display='block'}else{$('#formImgPreview').style.display='none'}$('#formPieces').innerHTML='';o.pieces.forEach(function(p){addRow(p)});$('#btnAddPiece').style.display='';$('#formOverlay').classList.add('active');document.body.style.overflow='hidden'}
function closeForm(){$('#formOverlay').classList.remove('active');document.body.style.overflow='';st.eid=null}
function addRow(data){data=data||{setName:'',slot:'头发'};var row=document.createElement('div');row.className='piece-row';var icon=SLOT_ICONS[data.slot]||'';row.innerHTML='<span class=\"slot-icon-svg\" style=\"width:28px;height:28px;flex-shrink:0;color:var(--mint)\">'+icon+'</span><select class=\"fn-slot\">'+SLOTS.map(function(s){return'<option value=\"'+s+'\"'+(s===data.slot?' selected':'')+'>'+esc(s)+'</option>'}).join('')+'</select><input type=\"text\" class=\"fn-set\" placeholder=\"服装名, 如: 嘟嘟锅\" value=\"'+esc(data.setName)+'\"><button class=\"btn-rm\">🗑</button>';row.querySelector('.fn-slot').addEventListener('change',function(){var svg=row.querySelector('.slot-icon-svg');if(svg)svg.innerHTML=SLOT_ICONS[this.value]||''});row.querySelector('.btn-rm').addEventListener('click',function(){var rows=$('#formPieces').querySelectorAll('.piece-row');if(rows.length>1){row.remove();upBtn()}else toast('至少保留一个部件')});var si=row.querySelector('.fn-set');ac(si,setNames);si.addEventListener('change',function(){var v=this.value.trim(),cs=row.querySelector('.fn-slot').value;if(!v)return;var rows=$('#formPieces').querySelectorAll('.piece-row');if(rows[rows.length-1]!==row)return;var idx=SLOTS.indexOf(cs),ns=SLOTS[(idx+1)%SLOTS.length];addRow({setName:'',slot:ns});var nrs=$('#formPieces').querySelectorAll('.piece-row');setTimeout(function(){nrs[nrs.length-1].querySelector('.fn-set').focus()},100)});$('#formPieces').appendChild(row);upBtn()}
function upBtn(){$('#btnAddPiece').style.display=''}
function saveForm(){var pr=$('#formPieces').querySelectorAll('.piece-row'),pieces=[];pr.forEach(function(r){var sn=r.querySelector('.fn-set').value.trim(),slot=r.querySelector('.fn-slot').value;if(sn)pieces.push({setName:sn,slot:slot})});if(!pieces.length){toast('请至少填写一个部件的服装名');return}function doSave(ib,tb,iw,ih){var now=Date.now(),o;if(st.eid){o=all.find(function(x){return x.id===st.eid});o.pieces=pieces;if(ib){o.image=ib;o.imageWidth=iw;o.imageHeight=ih}if(tb)o.thumbnail=tb}else{o={id:uid(),image:ib,thumbnail:tb,pieces:pieces,createdAt:now,imageWidth:iw,imageHeight:ih};all.push(o)}dbPut('outfits',o).then(function(){refresh().then(function(){closeForm();renderHome();toast(st.eid?'已更新 ✨':'已添加 ✨')})})}function processFile(f){doCrop(f).then(function(cb){imgSz(cb).then(function(sz){mkThumb(cb).then(function(tb){doSave(cb,tb,sz.w,sz.h)})})})}var fi=$('#formImageInput');if(st.eid){if(fi.files&&fi.files[0]){processFile(fi.files[0])}else{var old=all.find(function(x){return x.id===st.eid});doSave(old?old.image:null,old?old.thumbnail:null,old?old.imageWidth:0,old?old.imageHeight:0)}}else{if(!fi.files||!fi.files[0]){toast('请选择截图 📷');return}processFile(fi.files[0])}}

// ═══════ IMPORT/EXPORT ═══════
function b64(b){return new Promise(function(ok,fail){var r=new FileReader();r.onload=function(){ok(r.result)};r.onerror=fail;r.readAsDataURL(b)})}
function b2b(b64){var parts=b64.split(','),mime=parts[0].match(/:(.*?);/)[1],bytes=atob(parts[1]),arr=new Uint8Array(bytes.length);for(var i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);return new Blob([arr],{type:mime})}
function exportData(){if(!all.length){toast('没有数据可导出');return}toast('正在导出…');var ps=all.map(function(o){return Promise.all([b64(o.image),b64(o.thumbnail)]).then(function(p){return{id:o.id,createdAt:o.createdAt,pieces:o.pieces,imageBase64:p[0],thumbBase64:p[1],imageWidth:o.imageWidth||0,imageHeight:o.imageHeight||0}})});Promise.all(ps).then(function(data){var json=JSON.stringify({version:1,exportedAt:Date.now(),count:data.length,data:data}),blob=new Blob([json],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='luoke-'+fd(Date.now())+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('导出成功 📤')}).catch(function(e){toast('导出失败: '+e.message)})}
function importData(){var inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.addEventListener('change',function(){var file=this.files[0];if(!file)return;file.text().then(function(text){var json=JSON.parse(text);if(!json.data||!Array.isArray(json.data))throw new Error('无效备份');toast('正在导入 '+json.data.length+' 条…');var chain=Promise.resolve();json.data.forEach(function(item){chain=chain.then(function(){return dbGet('outfits',item.id).then(function(ex){if(ex)return;return dbPut('outfits',{id:item.id,createdAt:item.createdAt,pieces:item.pieces||[],image:b2b(item.imageBase64),thumbnail:b2b(item.thumbBase64||item.imageBase64),imageWidth:item.imageWidth||0,imageHeight:item.imageHeight||0})})})});chain.then(function(){refresh().then(function(){renderHome();toast('导入完成 🎉')})})}).catch(function(e){toast('导入失败: '+e.message)})});inp.click()}

// ═══════ SEARCH ═══════
function updSearch(){st.q=$('#searchInput').value.trim();if(st.q)$('#searchBar').classList.add('searching');else $('#searchBar').classList.remove('searching');if(st.tab==='home')renderHome()}

// ═══════ TAB SWITCH ═══════
function switchTab(tab){st.tab=tab;st.set=null;st.slot=null;var cw=document.getElementById('cw');if(cw)cw.remove();document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab)});if(tab==='cart'){renderCart()}else if(tab==='fashion'){renderFashion()}else{renderHome()}}

// ═══════ EVENTS ═══════
function bind(){
  document.querySelectorAll('.tab').forEach(function(t){t.addEventListener('click',function(){switchTab(t.dataset.tab)})});
  $('#fab').addEventListener('click',openAdd);
  $('#searchInput').addEventListener('input',updSearch);
  $('#btnClearSearch').addEventListener('click',function(){$('#searchInput').value='';updSearch()});
  $('#detailClose').addEventListener('click',closeDetail);
  $('#detailOverlay').addEventListener('click',function(e){if(e.target===this)closeDetail()});
  $('#detailEdit').addEventListener('click',function(){var id=st.did;closeDetail();if(id)openEdit(id)});
  $('#detailDelete').addEventListener('click',function(){var id=st.did;if(!id)return;confirm('确定删除这张搭配吗？').then(function(ok){if(!ok)return;dbDel('outfits',id).then(function(){closeDetail();refresh().then(function(){renderHome();toast('已删除 🗑')})})})});
  $('#formCancel').addEventListener('click',closeForm);
  $('#formOverlay').addEventListener('click',function(e){if(e.target===this)closeForm()});
  $('#formSubmit').addEventListener('click',saveForm);
  $('#btnSaveForm').addEventListener('click',saveForm);
  $('#btnAddPiece').addEventListener('click',function(){var rows=$('#formPieces').querySelectorAll('.piece-row'),ls='头发';if(rows.length)ls=rows[rows.length-1].querySelector('.fn-slot').value;var idx=SLOTS.indexOf(ls),ns=SLOTS[(idx+1)%SLOTS.length];addRow({setName:'',slot:ns});var nrs=$('#formPieces').querySelectorAll('.piece-row');setTimeout(function(){nrs[nrs.length-1].querySelector('.fn-set').focus()},100)});
  $('#formImageInput').addEventListener('change',function(){var f=this.files[0];if(f){$('#formImgPreview').src=URL.createObjectURL(f);$('#formImgPreview').style.display='block'}});
  $('#cropLand').addEventListener('click',function(){setCropRatio(16/9)});
  $('#cropPort').addEventListener('click',function(){setCropRatio(3/4)});
  $('#cropDone').addEventListener('click',applyCrop);bindCropEv();
  $('#pikaFormCancel').addEventListener('click',function(){$('#pikaFormOverlay').classList.remove('active')});
  $('#pikaDoAdd').addEventListener('click',addPikaFashion);
  $('#cartBadge').addEventListener('click',openCartPanel);
  $('#cartPanelBack').addEventListener('click',closeCartPanel);
  $('#installBtn').addEventListener('click',function(){if(dp){dp.prompt().then(function(r){if(r.outcome==='accepted'){toast('已安装');$('#installBanner').classList.remove('show');dp=null}}).catch(function(){})}else toast('浏览器菜单 → 添加到主屏幕')});
  $('#installDismiss').addEventListener('click',function(){$('#installBanner').classList.remove('show')});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'){if($('#detailOverlay').classList.contains('active'))closeDetail();else if($('#formOverlay').classList.contains('active'))closeForm()}});
}

// ═══════ PWA ═══════
var dp=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;$('#installBanner').classList.add('show')});
window.addEventListener('appinstalled',function(){dp=null;$('#installBanner').classList.remove('show')});
function regPWA(){if(!document.querySelector('link[rel=manifest]')){var l=document.createElement('link');l.rel='manifest';l.href='./manifest.json';document.head.appendChild(l)}if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js',{scope:'./'}).catch(function(){})}}
function cachePg(){if('caches' in window){setTimeout(function(){var h='<!DOCTYPE html>\n'+document.documentElement.outerHTML;caches.open('luoke-v9').then(function(c){c.put('./',new Response(h,{headers:{'Content-Type':'text/html; charset=utf-8'}}))}).catch(function(){})},3000)}}

// ═══════ INIT ═══════
function refresh(){return dbAll('outfits').then(function(arr){all=arr})}
function loadPika(){return dbAll('pika').then(function(arr){pika=arr;if(!pika.length){var chain=Promise.resolve();DEFAULT_PIKA.forEach(function(p){chain=chain.then(function(){return dbPut('pika',p)})});return chain.then(function(){return dbAll('pika')}).then(function(arr){pika=arr})}})}
function loadCart(){return dbAll('pikaCart').then(function(arr){cart=arr})}
function init(){
  dbo().then(function(){
    return Promise.all([refresh(),loadPika(),loadCart()]);
  }).then(function(){
    bind();regPWA();renderHome();cachePg();updateCartBadge();
  });
}
document.addEventListener('DOMContentLoaded',init);

})();
</script>
