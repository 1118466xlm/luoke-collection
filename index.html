<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FAD4C0">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="洛克收集簿">
<title>洛克收集簿</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sB:env(safe-area-inset-bottom,16px);--sT:env(safe-area-inset-top,0px);
  --bg:#FFFBF7;--surface:#FFF;--text:#5D576B;--text2:#A098AE;
  --border:#EBE3DA;--shadow:0 2px 10px rgba(0,0,0,.04);--radius:12px;
  --m1:#FFE8E0;--m1t:#C4887E;--m2:#FFECD2;--m2t:#C4985E;
  --m3:#FFF8D6;--m3t:#B89E3E;--m4:#E8F5E0;--m4t:#6E9E6E;
  --m5:#D8F0F5;--m5t:#5E8E9E;--m6:#F0E0F5;--m6t:#8E6EAE;
  --m7:#FFE0EC;--m7t:#B86E88;--m8:#FDE8E8;--m8t:#B06868
}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
#app{height:100%;display:flex;flex-direction:column;max-width:640px;margin:0 auto;position:relative}

.header{background:linear-gradient(135deg,var(--m7) 0%,var(--bg) 30%,var(--m2) 60%,var(--m6) 100%);padding:10px 16px 0;padding-top:max(10px,var(--sT));flex-shrink:0;z-index:2}
.header h1{font-size:24px;text-align:center;font-weight:700;letter-spacing:3px;color:#6E6068;padding-bottom:8px}
.tabs{display:flex;gap:6px;padding-bottom:8px}
.tab{flex:1;padding:10px 0;border:none;border-radius:10px 10px 0 0;background:rgba(255,255,255,.35);color:rgba(0,0,0,.45);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-weight:500;transition:all .15s}
.tab svg{width:16px;height:16px}
.tab.active{background:var(--bg);color:var(--text);font-weight:700}

.search-bar{padding:8px 14px;flex-shrink:0;display:flex;gap:6px;background:var(--bg)}
.search-bar input{flex:1;padding:10px 16px;border:2px solid var(--border);border-radius:24px;font-size:14px;background:var(--surface);outline:none;color:var(--text)}
.search-bar input:focus{border-color:#D5C8B8}
.search-bar input::placeholder{color:var(--text2)}
.search-bar .btn-clear{display:none;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;padding:0 6px;width:32px;height:32px;border-radius:50%;flex-shrink:0}
.search-bar .btn-clear:active{background:var(--m1)}
.search-bar.searching .btn-clear{display:block}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* carousel */
.carousel-wrap{padding:10px 10px 0}
.carousel-inner{width:100%;height:180px;border-radius:var(--radius);overflow:hidden;background:#1a1a2e;position:relative}
.carousel-inner canvas{width:100%;height:100%;display:block;transition:opacity .5s}
.carousel-inner .ci-overlay{position:absolute;inset:0;border-radius:var(--radius);background:linear-gradient(transparent 55%,rgba(0,0,0,.35));display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;pointer-events:none}
.carousel-inner .ci-row{display:flex;align-items:center;gap:8px}
.carousel-inner .ci-row>*{pointer-events:auto}
.carousel-inner .ci-label{color:#fff;font-size:11px;letter-spacing:1px;opacity:.7;flex:1}
.carousel-inner .ci-dots{display:flex;gap:5px}
.carousel-inner .ci-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);border:none;cursor:pointer;padding:0;transition:all .2s}
.carousel-inner .ci-dot.active{background:#fff;transform:scale(1.5)}
.carousel-inner .ci-btns{display:flex;gap:4px}
.carousel-inner .ci-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:12px;cursor:pointer}

.gallery{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.gallery .card{border-radius:var(--radius);background:var(--surface);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s}
.gallery .card:nth-child(8n+1){border-top:3px solid var(--m1t)}
.gallery .card:nth-child(8n+2){border-top:3px solid var(--m2t)}
.gallery .card:nth-child(8n+3){border-top:3px solid var(--m4t)}
.gallery .card:nth-child(8n+4){border-top:3px solid var(--m5t)}
.gallery .card:nth-child(8n+5){border-top:3px solid var(--m6t)}
.gallery .card:nth-child(8n+6){border-top:3px solid var(--m7t)}
.gallery .card:nth-child(8n+7){border-top:3px solid var(--m3t)}
.gallery .card:nth-child(8n+0){border-top:3px solid var(--m8t)}
.gallery .card:active{transform:scale(.97)}
.gallery .card .img-box{width:100%;height:160px;overflow:hidden;background:#F5F0EB}
.gallery .card .img-box img{width:100%;height:100%;object-fit:cover;display:block}
.gallery .card .info{padding:8px 10px;display:flex;gap:5px;flex-wrap:wrap}
.chip{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:600}
.export-row{display:flex;gap:10px;justify-content:center;padding:8px 10px calc(8px + var(--sB))}
.export-row button{padding:8px 20px;border-radius:20px;border:2px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;color:var(--text)}
.fashion-placeholder{text-align:center;padding:80px 20px;color:var(--text2)}

/* cart → 图鉴 */
.cart-wrap{padding:10px}
.cart-top-bar{display:flex;gap:8px;margin-bottom:10px;align-items:center}
.cart-add-btn{padding:8px 16px;border-radius:20px;border:none;background:var(--m3);color:var(--m3t);font-size:13px;cursor:pointer;font-weight:600}
.stat-bar{display:flex;align-items:center;gap:6px;margin-left:10px;font-size:11px;color:var(--text2);flex:1}
.stat-bar .prog-track{flex:1;max-width:120px;height:6px;border-radius:3px;background:var(--border);overflow:hidden}
.stat-bar .prog-fill{height:100%;border-radius:3px;background:var(--m4t);transition:width .3s}
.cart-sort-btn{padding:8px 10px;border-radius:20px;border:none;background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;font-weight:500}
.cart-gear-btn{padding:6px 8px;border-radius:50%;border:none;background:var(--surface);color:var(--text2);font-size:16px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.cart-list{display:flex;flex-direction:column;gap:8px}
/* swipe wrapper */
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--radius);box-shadow:var(--shadow)}
.swipe-wrap .swipe-bg{position:absolute;right:0;top:0;bottom:0;width:72px;display:flex;align-items:center;justify-content:center;background:var(--m5);color:var(--m5t);font-size:12px;font-weight:600;cursor:pointer;border:none;border-radius:0 var(--radius) var(--radius) 0}
.swipe-wrap .swipe-bg.in-cart{background:var(--m8);color:var(--m8t)}
.cart-row-h{display:flex;align-items:center;gap:8px;padding:10px;background:var(--surface);border-radius:var(--radius);position:relative;transition:transform .15s;transform:translateX(0);z-index:1}
.cart-row-h.swiped{transform:translateX(-72px)}
/* 8-color border */
.swipe-wrap:nth-child(8n+1){border-left:3px solid var(--m1)}
.swipe-wrap:nth-child(8n+2){border-left:3px solid var(--m2)}
.swipe-wrap:nth-child(8n+3){border-left:3px solid var(--m4)}
.swipe-wrap:nth-child(8n+4){border-left:3px solid var(--m5)}
.swipe-wrap:nth-child(8n+5){border-left:3px solid var(--m6)}
.swipe-wrap:nth-child(8n+6){border-left:3px solid var(--m7)}
.swipe-wrap:nth-child(8n+7){border-left:3px solid var(--m3)}
.swipe-wrap:nth-child(8n+0){border-left:3px solid var(--m8)}
/* collected states — blur text, not image */
.cart-row-h.collected-full .cr-info{filter:blur(.4px)}
.cart-row-h.collected-partial .cr-info{filter:blur(.2px)}
/* collect icons row — fixed right */
.collect-icons{display:inline-flex;align-items:center;gap:3px;cursor:pointer;z-index:2;margin-left:auto;margin-right:14px;flex-shrink:0}
.collect-icons svg{width:14px;height:14px}
.cart-row-h .cr-img{width:48px;height:48px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#F5F0EB;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;z-index:1}
.cart-row-h .cr-img .cr-plus{font-size:18px;color:rgba(0,0,0,.12);pointer-events:none}
.cart-row-h .cr-img img{width:100%;height:100%;object-fit:cover;position:relative;z-index:1}
.cart-row-h .cr-info{flex:1;min-width:0;z-index:1}
.cart-row-h .cr-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cart-row-h .cr-meta{display:flex;align-items:center;gap:6px}
.cart-row-h .cr-price{font-size:11px;color:var(--text2);white-space:nowrap}
.ci-quality-toggle{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;border:none;cursor:pointer;z-index:1;position:relative}
.ci-quality-gold{background:var(--m3);color:var(--m3t)}
.ci-quality-purple{background:var(--m6);color:var(--m6t)}

/* cart badge on homepage */
.cart-sidebar{position:fixed;right:20px;bottom:calc(88px + var(--sB));z-index:21}
.cart-badge{width:48px;height:48px;border-radius:50%;border:none;background:var(--m7);color:var(--m7t);font-size:20px;cursor:pointer;box-shadow:0 4px 14px rgba(248,184,168,.35);position:relative;display:flex;align-items:center;justify-content:center}
.cart-badge .cb-count{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;background:var(--m5);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cart-badge svg{width:22px;height:22px}

/* cart settlement panel */
.cart-panel{display:none;position:fixed;inset:0;z-index:75;background:var(--bg);flex-direction:column;max-width:640px;margin:0 auto}
.cart-panel.active{display:flex}
.cart-panel .panel-header{background:var(--m4);color:var(--m4t);padding:10px 16px;padding-top:max(10px,var(--sT));display:flex;align-items:center;gap:8px;flex-shrink:0}
.cart-panel .panel-header button{background:none;border:none;color:var(--m4t);font-size:16px;cursor:pointer}
.cart-panel .panel-header .ph-title{font-size:18px;flex:1;font-weight:700}
.cart-panel .panel-body{flex:1;overflow-y:auto;padding:10px}
.cart-panel .panel-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cart-panel .panel-row img{width:48px;height:48px;object-fit:cover;border-radius:8px;background:#F5F0EB}
.cart-panel .panel-row .pr-name{flex:1;font-size:14px;font-weight:600}
.cart-panel .panel-row .pr-del{background:none;border:none;color:var(--m8t);font-size:14px;cursor:pointer}
.cart-panel .panel-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:13px;color:var(--text2)}
.cart-panel .panel-chk{width:22px;height:22px;border-radius:50%;appearance:none;-webkit-appearance:none;border:2px solid var(--border);background:var(--surface);cursor:pointer;flex-shrink:0;position:relative}
.cart-panel .panel-chk:checked{background:var(--m4);border-color:var(--m4t)}
.cart-panel .panel-chk:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--m4t);font-weight:700}

/* pika form */
.form-mini{display:flex;flex-direction:column;gap:8px}
.form-mini input,.form-mini select{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-size:14px;background:var(--surface);outline:none;color:var(--text)}
.form-mini input:focus,.form-mini select:focus{border-color:#D5C8B8}

/* detail — compact card */
.detail-overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center}
.detail-overlay.active{display:flex}
.detail-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.15);width:calc(100vw - 40px);max-width:420px;max-height:80vh;overflow-y:auto;position:relative}
.detail-card .dc-img{width:100%;max-height:200px;object-fit:contain;display:block;background:#F5F0EB}
.detail-close{position:absolute;top:8px;right:8px;width:30px;height:30px;border-radius:50%;border:none;background:rgba(0,0,0,.3);color:#fff;font-size:14px;cursor:pointer;z-index:1;display:flex;align-items:center;justify-content:center;font-weight:700}
.detail-info{padding:12px 14px;color:var(--text)}
.detail-info .date{font-size:12px;color:var(--text2);margin-bottom:10px}

/* pieces — 2-column grid */
.pieces{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.piece-card{border-radius:10px;padding:8px 10px}
.piece-card:nth-child(8n+1){background:var(--m1)}
.piece-card:nth-child(8n+2){background:var(--m2)}
.piece-card:nth-child(8n+3){background:var(--m4)}
.piece-card:nth-child(8n+4){background:var(--m5)}
.piece-card:nth-child(8n+5){background:var(--m6)}
.piece-card:nth-child(8n+6){background:var(--m7)}
.piece-card:nth-child(8n+7){background:var(--m3)}
.piece-card:nth-child(8n+0){background:var(--m8)}
.piece-card .p-set{font-size:12px;font-weight:700}
.piece-card .p-slot{font-size:11px;color:var(--text2)}
.detail-actions{display:flex;gap:10px;padding:12px 14px}
.detail-actions button{flex:1;padding:10px;border-radius:10px;border:none;font-size:14px;cursor:pointer;font-weight:600}
.btn-edit{background:var(--m4);color:var(--m4t)}
.btn-delete{background:var(--m8);color:var(--m8t)}

/* form */
.form-overlay{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;overflow-y:auto}
.form-overlay.active{display:flex}
.form-header{background:var(--m4);color:var(--m4t);padding:10px 16px;padding-top:max(10px,var(--sT));flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.form-header button{background:none;border:none;color:var(--m4t);font-size:16px;cursor:pointer}
.form-header span{font-weight:700;font-size:16px}
.form-body{flex:1;padding:16px;overflow-y:auto}
.form-body label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin:14px 0 6px}
.form-body label:first-child{margin-top:0}
.form-body input[type=text],.form-body select{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:15px;background:var(--surface);outline:none;color:var(--text)}
.form-body input[type=text]:focus,.form-body select:focus{border-color:#D5C8B8}
.form-body input[type=text]::placeholder{color:var(--text2)}
.form-body input[type=file]{margin-top:8px;font-size:14px;color:var(--text)}
.img-preview{width:100%;max-height:200px;object-fit:contain;border-radius:var(--radius);margin-top:8px;background:#F5F0EB;display:none}

/* piece row */
.piece-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:10px;background:var(--surface);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.piece-row .slot-dd-wrap{position:relative;width:80px;flex-shrink:0}
.piece-row .slot-dd-btn{width:100%;padding:10px 8px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;outline:none;text-align:left;display:flex;align-items:center;justify-content:space-between;white-space:nowrap}
.piece-row .slot-dd-btn::after{content:'▾';font-size:10px;color:var(--text2);margin-left:4px}
.piece-row .slot-dd-btn:focus{border-color:#D5C8B8}
.piece-row .slot-dd-menu{display:none;position:absolute;top:100%;left:0;right:0;z-index:10;background:var(--surface);border:2px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.06);overflow:hidden}
.piece-row .slot-dd-menu.open{display:block}
.piece-row .slot-dd-menu .sl-opt{padding:10px 12px;cursor:pointer;font-size:14px;border-bottom:1px solid #F5EFE8;color:var(--text)}
.piece-row .slot-dd-menu .sl-opt:last-child{border-bottom:none}
.piece-row .slot-dd-menu .sl-opt:active{background:var(--m3)}
.piece-row input{flex:1;min-width:60px;font-size:14px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);outline:none}
.piece-row input:focus{border-color:#D5C8B8}
.piece-row input::placeholder{color:var(--text2)}
.piece-row .btn-rm{background:none;border:none;color:var(--m8t);font-size:14px;cursor:pointer;padding:2px 4px;flex-shrink:0}
.ac-wrap{position:relative;flex:1;min-width:60px}
.ac-dd{display:none;position:absolute;top:100%;left:0;right:0;z-index:10;background:var(--surface);border:2px solid var(--border);border-radius:10px;max-height:150px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.06)}
.ac-dd.show{display:block}
.ac-dd .ac-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #F5EFE8;color:var(--text)}
.ac-dd .ac-item:last-child{border-bottom:none}
.ac-dd .ac-item:active{background:var(--m3)}
.btn-add-piece{padding:12px;border:2px dashed var(--m6);border-radius:12px;background:none;color:var(--m6t);font-size:14px;cursor:pointer;margin-top:8px;font-weight:600;display:block;width:100%}
.btn-save{width:100%;padding:15px;background:var(--m4);color:var(--m4t);border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;margin-top:18px;margin-bottom:var(--sB)}

/* crop */
.crop-overlay{position:fixed;inset:0;z-index:80;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;touch-action:none}
.crop-overlay.active{display:flex}
#cropImgWrap{position:relative;overflow:hidden;background:#000;touch-action:none}
#cropImg{position:absolute;transform-origin:0 0;will-change:transform;pointer-events:none}
#cropBox{position:absolute;z-index:2;pointer-events:none;box-shadow:0 0 0 9999px rgba(0,0,0,.55);border:2px dashed #fff;border-radius:2px}
.crop-tools{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.crop-tools button{padding:10px 18px;border-radius:20px;border:none;font-size:14px;cursor:pointer;font-weight:600}
.crop-btn-land{background:var(--m4);color:var(--m4t)}
.crop-btn-port{background:var(--m2);color:var(--m2t)}
.crop-btn-done{background:#fff;color:var(--text)}
.crop-hint{color:#fff;font-size:12px;opacity:.5;text-align:center;margin-top:8px}

.fab{position:fixed;right:20px;bottom:calc(20px + var(--sB));width:56px;height:56px;border-radius:50%;border:none;background:var(--m4);color:var(--m4t);font-size:28px;box-shadow:0 6px 18px rgba(168,216,185,.3);cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.fab:active{transform:scale(.9)}
.fab svg{width:26px;height:26px}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.install-banner{display:none;position:fixed;bottom:calc(84px + var(--sB));left:16px;right:16px;background:var(--surface);border-radius:var(--radius);box-shadow:0 6px 20px rgba(0,0,0,.08);padding:16px;z-index:30;align-items:center;gap:12px;border:2px solid var(--m4)}
.install-banner.show{display:flex}
.install-banner .ib-text{flex:1;font-size:14px}
.install-banner button{padding:9px 18px;border-radius:20px;border:none;background:var(--m4);color:var(--m4t);font-size:14px;cursor:pointer;white-space:nowrap;font-weight:600}
.install-banner .ib-close{background:none;color:var(--text2);font-size:14px;padding:4px}
.confirm-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center}
.confirm-overlay.active{display:flex}
.confirm-dialog{background:var(--surface);border-radius:18px;padding:24px;max-width:300px;width:90%;text-align:center}
.confirm-dialog p{margin-bottom:20px;font-size:15px;line-height:1.5;color:var(--text)}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:11px;border-radius:12px;border:none;font-size:15px;cursor:pointer;font-weight:600}
.btn-cancel{background:var(--m1);color:var(--m1t)}

function startCrop(file,ratio,ok){
  st.cropRes=ok;st.cropRatio=ratio||3/4;st.cropTX=0;st.cropTY=0;st.cropScale=1;
  var img=new Image();img.onload=function(){
    st.cropImg=img;var mw=window.innerWidth,mh=window.innerHeight*.65;

    var el=$("#cropImg");el.src=bu(file);el.style.width=img.width+"px";el.style.height=img.height+"px";
    var s=Math.min(bw/img.width,bh/img.height);st.cropScale=s;st.cropTX=(mw-img.width*s)/2;st.cropTY=(mh-img.height*s)/2;
    el.style.transform="translate("+st.cropTX+"px,"+st.cropTY+"px) scale("+st.cropScale+")";
    $("#cropBox").style.cssText="width:"+bw+"px;height:"+bh+"px;left:"+((mw-bw)/2)+"px;top:"+((mh-bh)/2)+"px";
    $("#cropTools").innerHTML='<button class="crop-btn-land" id="cropLand">📐 16:9</button><button class="crop-btn-port" id="cropPort">📱 3:4</button><button class="crop-btn-done" id="cropDone">✅ 确认</button>';
    $("#cropHint").textContent="选择比例后点确认";
    $("#cropOverlay").classList.add("active");
    var bl=$("#cropLand"),bp=$("#cropPort"),bd=$("#cropDone");if(bl)bl.onclick=function(){setCropRatio(16/9)};if(bp)bp.onclick=function(){setCropRatio(3/4)};if(bd)bd.onclick=applyCrop;
  };img.src=bu(file);
}
function updateCropImg(){$("#cropImg").style.transform="translate("+st.cropTX+"px,"+st.cropTY+"px) scale("+st.cropScale+")"}
function setCropRatio(r){st.cropRatio=r;var mw=window.innerWidth,mh=window.innerHeight*.65,bw=mw-20,bh=bw/r;if(bh>mh-20){bh=mh-20;bw=bh*r}st.boxW=bw;st.boxH=bh;var img=st.cropImg,s=Math.min(bw/img.width,bh/img.height);st.cropScale=s;st.cropTX=(mw-img.width*s)/2;st.cropTY=(mh-img.height*s)/2;updateCropImg();$("#cropBox").style.cssText="width:"+bw+"px;height:"+bh+"px;left:"+((mw-bw)/2)+"px;top:"+((mh-bh)/2)+"px"}
function applyCrop(){var img=st.cropImg,mw=window.innerWidth,mh=window.innerHeight*.65,bx=(mw-st.boxW)/2,by=(mh-st.boxH)/2;var sx=(bx-st.cropTX)/st.cropScale,sy=(by-st.cropTY)/st.cropScale,sw=st.boxW/st.cropScale,sh=st.boxH/st.cropScale;sx=Math.max(0,Math.min(img.width-sw,sx));sy=Math.max(0,Math.min(img.height-sh,sy));var c=document.createElement("canvas");c.width=sw;c.height=sh;c.getContext("2d").drawImage(img,sx,sy,sw,sh,0,0,sw,sh);c.toBlob(function(b){$("#cropOverlay").classList.remove("active");var r=st.cropRes;st.cropRes=null;st.cropImg=null;if(r)r(b)},"image/png")}
function bindCropEv(){
  var w=$("#cropImgWrap");
  var ds=0,di=0,si=0,dx0=0,dy0=0,// pinch vars
      fx0=0,fy0=0,             // drag: finger start
      touchMode='none';

  function gd(t){var dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}

  // Use touchstart/touchmove/touchend on document to get all touches reliably
  var overlay=$("#cropOverlay");
  overlay.addEventListener("touchstart",function(e){
    if(!overlay.classList.contains("active"))return;
    var n=e.touches.length;
    if(n>=2){
      touchMode='pinch';di=gd(e.touches);si=st.cropScale;
      ds=di;
      // anchor: center between two fingers
      dx0=(e.touches[0].clientX+e.touches[1].clientX)/2;
      dy0=(e.touches[0].clientY+e.touches[1].clientY)/2;
    }else{
      touchMode='drag';fx0=e.touches[0].clientX;fy0=e.touches[0].clientY;
    }
  },{passive:false});

  overlay.addEventListener("touchmove",function(e){
    if(!overlay.classList.contains("active"))return;
    if(touchMode==='pinch'&&e.touches.length>=2){
      var nd=gd(e.touches),scl=si*(nd/di);scl=Math.max(.1,Math.min(5,scl));
      var cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      var cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
      st.cropTX=cx-(cx-st.cropTX)*(scl/st.cropScale);
      st.cropTY=cy-(cy-st.cropTY)*(scl/st.cropScale);
      st.cropScale=scl;updateCropImg();
    }else if(touchMode==='drag'&&e.touches.length===1){
      st.cropTX+=e.touches[0].clientX-fx0;st.cropTY+=e.touches[0].clientY-fy0;
      fx0=e.touches[0].clientX;fy0=e.touches[0].clientY;updateCropImg();
    }else if(e.touches.length>=2){
      // mode switch: drag → pinch
      touchMode='pinch';di=gd(e.touches);si=st.cropScale;ds=di;
      dx0=(e.touches[0].clientX+e.touches[1].clientX)/2;
      dy0=(e.touches[0].clientY+e.touches[1].clientY)/2;
    }
    e.preventDefault();
  },{passive:false});

  overlay.addEventListener("touchend",function(e){
    if(!overlay.classList.contains("active"))return;
    var n=e.touches.length;
    if(n===0){touchMode='none'}
    else if(n===1){touchMode='drag';fx0=e.touches[0].clientX;fy0=e.touches[0].clientY}
    else{touchMode='pinch';di=gd(e.touches);si=st.cropScale;ds=di;
      dx0=(e.touches[0].clientX+e.touches[1].clientX)/2;dy0=(e.touches[0].clientY+e.touches[1].clientY)/2}
  });
}

function b64(b){return new Promise(function(ok,fail){var r=new FileReader();r.onload=function(){ok(r.result)};r.onerror=fail;r.readAsDataURL(b)})}
function b2b(b64){var parts=b64.split(","),mime=parts[0].match(/:(.*?);/)[1],bytes=atob(parts[1]),arr=new Uint8Array(bytes.length);for(var i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);return new Blob([arr],{type:mime})}
function exportData(){
  if(!all.length&&!pika.length){toast("没有数据可导出");return}toast("正在导出…");
  var ouf=all.map(function(o){return Promise.all([b64(o.image),b64(o.thumbnail)]).then(function(p){return{id:o.id,createdAt:o.createdAt,pieces:o.pieces,imageBase64:p[0],thumbBase64:p[1],imageWidth:o.imageWidth||0,imageHeight:o.imageHeight||0}})});
  var pkf=pika.map(function(p){if(!p.imageBlob)return Promise.resolve({id:p.id,name:p.name,quality:p.quality,collectState:p.collectState||'none'});return b64(p.imageBlob).then(function(b){return{id:p.id,name:p.name,quality:p.quality,collectState:p.collectState||'none',imageBase64:b}})});
  var ctf=cart.map(function(c){if(!c.imageBlob)return Promise.resolve({id:c.id,name:c.name,quality:c.quality,price:c.price});return b64(c.imageBlob).then(function(b){return{id:c.id,name:c.name,quality:c.quality,price:c.price,imageBase64:b}})});
  Promise.all([Promise.all(ouf),Promise.all(pkf),Promise.all(ctf)]).then(function(r){var json=JSON.stringify({version:2,exportedAt:Date.now(),outfits:r[0],pika:r[1],cart:r[2]}),blob=new Blob([json],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="luoke-"+fd(Date.now())+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast("导出成功 📤 共 "+r[0].length+" 搭配 + "+r[1].length+" 时装 + "+r[2].length+" 购物车")}).catch(function(e){toast("导出失败: "+e.message)});
}
function importData(){var inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.addEventListener("change",function(){var file=this.files[0];if(!file)return;file.text().then(function(text){var json=JSON.parse(text);var chain=Promise.resolve();
  if(json.version===1){
    // old format: outfits only
    if(!json.data||!Array.isArray(json.data))throw new Error("无效备份");
    toast("正在导入 v1 "+json.data.length+" 条(仅搭配)…");
    json.data.forEach(function(item){chain=chain.then(function(){return new Promise(function(ok2){var t=db.transaction("outfits","readonly"),r=t.objectStore("outfits").get(item.id);r.onsuccess=function(){ok2(r.result)};r.onerror=function(){ok2(null)}})}).then(function(ex){if(ex)return;return dbPut("outfits",{id:item.id,createdAt:item.createdAt,pieces:item.pieces||[],image:b2b(item.imageBase64),thumbnail:b2b(item.thumbBase64||item.imageBase64),imageWidth:item.imageWidth||0,imageHeight:item.imageHeight||0})})});
  }else if(json.version===2){
    // new format: outfits + pika + cart
    var ocount=(json.outfits||[]).length,pcount=(json.pika||[]).length,ccount=(json.cart||[]).length;
    toast("正在导入: "+ocount+"搭配 + "+pcount+"时装 + "+ccount+"购物车…");
    (json.outfits||[]).forEach(function(item){chain=chain.then(function(){return new Promise(function(ok2){var t=db.transaction("outfits","readonly"),r=t.objectStore("outfits").get(item.id);r.onsuccess=function(){ok2(r.result)};r.onerror=function(){ok2(null)}})}).then(function(ex){if(ex)return;return dbPut("outfits",{id:item.id,createdAt:item.createdAt,pieces:item.pieces||[],image:b2b(item.imageBase64),thumbnail:b2b(item.thumbBase64||item.imageBase64),imageWidth:item.imageWidth||0,imageHeight:item.imageHeight||0})})});
    (json.pika||[]).forEach(function(item){chain=chain.then(function(){return new Promise(function(ok2){var t=db.transaction("pika","readonly"),r=t.objectStore("pika").get(item.id);r.onsuccess=function(){ok2(r.result)};r.onerror=function(){ok2(null)}})}).then(function(ex){if(ex)return;var obj={id:item.id,name:item.name,quality:item.quality||"紫色",collectState:item.collectState||"none"};if(item.imageBase64)obj.imageBlob=b2b(item.imageBase64);return dbPut("pika",obj)})});
    (json.cart||[]).forEach(function(item){chain=chain.then(function(){return new Promise(function(ok2){var t=db.transaction("pikaCart","readonly"),r=t.objectStore("pikaCart").get(item.id);r.onsuccess=function(){ok2(r.result)};r.onerror=function(){ok2(null)}})}).then(function(ex){if(ex)return;var obj={id:item.id,name:item.name,quality:item.quality||"紫色",price:item.price||98};if(item.imageBase64)obj.imageBlob=b2b(item.imageBase64);return dbPut("pikaCart",obj)})});
  }else{throw new Error("未知备份版本")}
  chain.then(function(){return Promise.all([refresh(),loadPika(),loadCart()])}).then(function(){renderHome();updateCartBadge();toast("导入完成 🎉")});
}).catch(function(e){toast("导入失败: "+e.message)})});inp.click()}

function updSearch(){st.q=$("#searchInput").value.trim();if(st.q)$("#searchBar").classList.add("searching");else $("#searchBar").classList.remove("searching");if(st.tab==="home")renderHome()}
function switchTab(tab){st.tab=tab;var cw=document.getElementById("cw");if(cw)cw.remove();document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("active",t.dataset.tab===tab)});if(tab==="cart"){renderCart()}else if(tab==="fashion"){renderFashion()}else{renderHome()}}

function bind(){
  document.querySelectorAll(".tab").forEach(function(t){t.addEventListener("click",function(){switchTab(t.dataset.tab)})});
  $("#fab").addEventListener("click",openAdd);
  $("#cartBadge").addEventListener("click",openCartPanel);
  $("#searchInput").addEventListener("input",updSearch);$("#btnClearSearch").addEventListener("click",function(){$("#searchInput").value="";updSearch()});
  $("#detailClose").addEventListener("click",closeDetail);
  $("#detailOverlay").addEventListener("click",function(e){if(e.target===this)closeDetail()});
  $("#detailEdit").addEventListener("click",function(){var id=st.did;closeDetail();if(id)openEdit(id)});
  $("#detailDelete").addEventListener("click",function(){var id=st.did;if(!id)return;confirm("确定删除这张搭配吗？").then(function(ok){if(!ok)return;dbDel("outfits",id).then(function(){closeDetail();refresh().then(function(){renderHome();toast("已删除 🗑")})})})});
  $("#formCancel").addEventListener("click",closeForm);$("#formOverlay").addEventListener("click",function(e){if(e.target===this)closeForm()});
  $("#formSubmit").addEventListener("click",saveForm);$("#btnSaveForm").addEventListener("click",saveForm);
  $("#btnAddPiece").addEventListener("click",function(){var rows=$("#formPieces").querySelectorAll(".piece-row"),ls="头发";if(rows.length){ls=rows[rows.length-1].querySelector(".slot-dd-btn").textContent}var idx=SL.indexOf(ls),ns=SL[(idx+1)%SL.length];addRow({setName:"",slot:ns});var nrs=$("#formPieces").querySelectorAll(".piece-row");setTimeout(function(){nrs[nrs.length-1].querySelector(".fn-set").focus()},100)});
  $("#formImageInput").addEventListener("change",function(){var f=this.files[0];if(!f)return;startCrop(f,3/4,function(cropped){st.croppedImgBlob=cropped;$("#formImgPreview").src=bu(cropped);$("#formImgPreview").style.display="block"})});
  bindCropEv();
  $("#pikaFormCancel").addEventListener("click",function(){$("#pikaFormOverlay").classList.remove("active")});
  $("#pikaDoAdd").addEventListener("click",addPikaFashion);
  $("#cartPanelBack").addEventListener("click",closeCartPanel);$("#btnManage").addEventListener("click",function(){panelMode=!panelMode;this.textContent=panelMode?"✅":"⚙";renderCartPanel()});
  $("#installBtn").addEventListener("click",function(){if(dp){dp.prompt().then(function(r){if(r.outcome==="accepted"){toast("已安装");$("#installBanner").classList.remove("show");dp=null}}).catch(function(){})}else toast("浏览器菜单 → 添加到主屏幕")});
  $("#installDismiss").addEventListener("click",function(){$("#installBanner").classList.remove("show")});
  document.addEventListener("keydown",function(e){if(e.key==="Escape"){if($("#detailOverlay").classList.contains("active"))closeDetail();else if($("#formOverlay").classList.contains("active"))closeForm()}});
}

var dp=null;
window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();dp=e;$("#installBanner").classList.add("show")});
window.addEventListener("appinstalled",function(){dp=null;$("#installBanner").classList.remove("show")});
function regPWA(){if(!document.querySelector('link[rel="manifest"]')){var l=document.createElement("link");l.rel="manifest";l.href="./manifest.json";document.head.appendChild(l)}if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js",{scope:"./"}).catch(function(){})}}
function cachePg(){if("caches" in window){setTimeout(function(){var h="<!DOCTYPE html>\n"+document.documentElement.outerHTML;caches.open("luoke-v10").then(function(c){c.put("./",new Response(h,{headers:{"Content-Type":"text/html; charset=utf-8"}}))}).catch(function(){})},3000)}}
function refresh(){return dbAll("outfits").then(function(arr){all=arr})}
function loadPika(){return dbAll("pika").then(function(arr){pika=arr;if(!pika.length){var chain=Promise.resolve();DP.forEach(function(p){chain=chain.then(function(){return dbPut("pika",p)})});return chain.then(function(){return dbAll("pika")}).then(function(arr){pika=arr})}})}
function loadCart(){return dbAll("pikaCart").then(function(arr){cart=arr})}
function init(){dbo().then(function(){return Promise.all([refresh(),loadPika(),loadCart()])}).then(function(){bind();regPWA();renderHome();cachePg();updateCartBadge()})}
document.addEventListener("DOMContentLoaded",init);
}();</script>
</body>
