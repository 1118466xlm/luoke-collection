<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#A8D8B9">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="洛克收集簿">
<title>洛克收集簿</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --c0:#A8D8B9;--c1:#B5EAD7;--c2:#B5D8EB;--c3:#F4C2C2;--c4:#FAD4C0;
  --c5:#CDC0E0;--c6:#FDF0C8;--c7:#F8B8A8;--c8:#FBE0C8;
  --bg:#FFFDF9;--surface:#FFF;--text:#5D576B;--text2:#A098AE;
  --border:#EBE3DA;--shadow:0 2px 10px rgba(0,0,0,.04);
  --radius:12px;--sB:env(safe-area-inset-bottom,16px);--sT:env(safe-area-inset-top,0px)
}
html,body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;user-select:none}
#app{height:100%;display:flex;flex-direction:column;max-width:640px;margin:0 auto;position:relative}
.header{background:var(--c0);color:#fff;padding:10px 16px;padding-top:max(10px,var(--sT));flex-shrink:0;z-index:2}
.header h1{font-size:19px;text-align:center;font-weight:700;letter-spacing:3px}
.tabs{display:flex;padding:6px 12px 0;gap:6px;flex-shrink:0;background:var(--c0)}
.tab{flex:1;padding:10px 0;border:none;border-radius:10px 10px 0 0;background:rgba(255,255,255,.25);color:rgba(255,255,255,.8);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-weight:500;transition:all .15s}
.tab svg{width:16px;height:16px}
.tab.active{background:linear-gradient(135deg,#FFF5F5,#FFF0E8,#F5F0FF);color:var(--text);font-weight:700}
.search-bar{padding:8px 14px;flex-shrink:0;display:flex;gap:6px;background:var(--bg)}
.search-bar input{flex:1;padding:10px 16px;border:2px solid var(--border);border-radius:24px;font-size:14px;background:var(--surface);outline:none;color:var(--text)}
.search-bar input:focus{border-color:var(--c0)}
.search-bar input::placeholder{color:var(--text2)}
.search-bar .btn-clear{display:none;background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:0 6px}
.search-bar.searching .btn-clear{display:inline}
.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.carousel-wrap{padding:10px 10px 0}
.carousel-inner{width:100%;height:180px;border-radius:var(--radius);overflow:hidden;background:#1a1a2e;position:relative}
.carousel-inner canvas{width:100%;height:100%;display:block;transition:opacity .5s}
.carousel-inner .ci-overlay{position:absolute;inset:0;border-radius:var(--radius);background:linear-gradient(transparent 55%,rgba(0,0,0,.35));display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;pointer-events:none}
.carousel-inner .ci-row{display:flex;align-items:center;gap:8px}
.carousel-inner .ci-row>*{pointer-events:auto}
.carousel-inner .ci-label{color:#fff;font-size:11px;letter-spacing:1px;opacity:.7;flex:1}
.carousel-inner .ci-dots{display:flex;gap:5px}
.carousel-inner .ci-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);border:none;cursor:pointer;padding:0;transition:all .2s}
.carousel-inner .ci-dot.active{background:#fff;transform:scale(1.5)}
.carousel-inner .ci-btns{display:flex;gap:4px}
.carousel-inner .ci-btn{width:28px;height:28px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:12px;cursor:pointer}
.gallery{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}
.gallery .card{border-radius:var(--radius);background:var(--surface);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:transform .12s}
.gallery .card:nth-child(5n+1){border-top:3px solid var(--c0)}
.gallery .card:nth-child(5n+2){border-top:3px solid var(--c2)}
.gallery .card:nth-child(5n+3){border-top:3px solid var(--c3)}
.gallery .card:nth-child(5n+4){border-top:3px solid var(--c5)}
.gallery .card:nth-child(5n+0){border-top:3px solid var(--c4)}
.gallery .card:active{transform:scale(.97)}
.gallery .card .img-box{width:100%;height:160px;overflow:hidden;background:#F5F0EB}
.gallery .card .img-box img{width:100%;height:100%;object-fit:cover;display:block}
.gallery .card .info{padding:8px 10px;display:flex;gap:5px;flex-wrap:wrap}
.chip{display:inline-block;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:600}
.export-row{display:flex;gap:10px;justify-content:center;padding:8px 10px calc(8px + var(--sB))}
.export-row button{padding:8px 20px;border-radius:20px;border:2px solid var(--border);background:var(--surface);font-size:13px;cursor:pointer;color:var(--text)}
.fashion-placeholder{text-align:center;padding:80px 20px;color:var(--text2);background:var(--bg)}
.fashion-placeholder svg{margin-bottom:16px;opacity:.5}
.fashion-placeholder p{font-size:15px;line-height:1.7}
.cart-wrap{padding:10px}
.cart-add-bar{display:flex;gap:8px;margin-bottom:10px}
.cart-add-bar button{padding:8px 16px;border-radius:20px;border:none;background:var(--c7);color:#fff;font-size:13px;cursor:pointer;font-weight:600}
.cart-list{display:flex;flex-direction:column;gap:8px}
.cart-row-h{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow)}
.cart-row-h:nth-child(odd){border-left:3px solid var(--c0)}
.cart-row-h:nth-child(even){border-left:3px solid var(--c5)}
.cart-row-h .cr-img{width:64px;height:48px;flex-shrink:0;border-radius:8px;overflow:hidden;background:#F5F0EB;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative}
.cart-row-h .cr-img img{width:100%;height:100%;object-fit:cover}
.cart-row-h .cr-img .cr-plus{font-size:22px;color:rgba(0,0,0,.15);font-weight:300;position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:0}
.cart-row-h .cr-img img{position:relative;z-index:1}
.cart-row-h .cr-info{flex:1;min-width:0}
.cart-row-h .cr-name{font-size:14px;font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-row-h .cr-meta{display:flex;align-items:center;gap:6px}
.ci-quality-toggle{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;border:none;cursor:pointer}
.ci-quality-gold{background:#FFF8D6;color:#B8860B}
.ci-quality-purple{background:#F0E0F5;color:#7D3C98}
.cart-row-h .cr-buy{padding:6px 14px;border:none;border-radius:16px;background:var(--c2);color:#fff;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap;flex-shrink:0}
.cart-row-h .cr-buy.in-cart{background:#F5EFE8;color:var(--text2)}
.cart-sidebar{position:fixed;right:20px;bottom:calc(88px + var(--sB));z-index:21}
.cart-badge{width:48px;height:48px;border-radius:50%;border:none;background:var(--c7);color:#fff;font-size:20px;cursor:pointer;box-shadow:0 4px 14px rgba(248,184,168,.4);position:relative;display:flex;align-items:center;justify-content:center}
.cart-badge .cb-count{position:absolute;top:-4px;right:-4px;width:20px;height:20px;border-radius:50%;background:var(--c2);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
.cart-badge svg{width:22px;height:22px}
.cart-panel{display:none;position:fixed;inset:0;z-index:75;background:var(--bg);flex-direction:column;max-width:640px;margin:0 auto}
.cart-panel.active{display:flex}
.cart-panel-header{background:var(--c7);color:#fff;padding:10px 16px;padding-top:max(10px,var(--sT));display:flex;align-items:center;gap:10px;flex-shrink:0}
.cart-panel-header button{background:none;border:none;color:#fff;font-size:18px;cursor:pointer}
.cart-panel-header h2{font-size:18px;flex:1}
.cart-panel-body{flex:1;overflow-y:auto;padding:10px}
.cart-panel-body .cart-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.cart-panel-body .cart-row img{width:48px;height:48px;object-fit:cover;border-radius:8px;background:#F5F0EB}
.cart-panel-body .cart-row .cr-name{flex:1;font-size:14px;font-weight:600}
.cart-panel-body .cart-row .cr-del{background:none;border:none;color:var(--c3);font-size:18px;cursor:pointer}
.cart-panel-footer{padding:10px 16px calc(10px + var(--sB));border-top:1px solid var(--border);text-align:center;color:var(--text2);font-size:13px}
.form-mini{display:flex;flex-direction:column;gap:8px}
.form-mini input,.form-mini select{width:100%;padding:10px 12px;border:2px solid var(--border);border-radius:10px;font-size:14px;background:var(--surface);outline:none;color:var(--text)}
.form-mini input:focus,.form-mini select:focus{border-color:var(--c7)}
.detail-overlay{position:fixed;inset:0;z-index:50;background:rgba(25,15,15,.96);display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail-overlay.active{display:flex}
.detail-close{position:sticky;top:max(10px,var(--sT));align-self:flex-end;width:40px;height:40px;border-radius:50%;border:none;background:rgba(255,255,255,.1);color:#fff;font-size:18px;cursor:pointer;z-index:2;margin:10px}
.detail-img{width:100%;display:block}
.detail-info{padding:16px;color:#fff;overflow:visible}
.detail-info .date{font-size:12px;color:var(--c4);margin-bottom:14px}
.pieces{display:flex;flex-direction:column;gap:8px}
.piece-card{background:rgba(255,255,255,.06);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;border-left:3px solid var(--c0)}
.piece-card:nth-child(odd){border-left-color:var(--c0)}
.piece-card:nth-child(even){border-left-color:var(--c4)}
.piece-card .p-set{font-size:14px;font-weight:700;color:var(--c6)}
.piece-card .p-slot{font-size:13px;color:var(--c4)}
.piece-card .slot-icon-wrap{width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.1);border-radius:8px;color:var(--c0)}
.detail-actions{display:flex;gap:10px;padding:0 16px 24px}
.detail-actions button{flex:1;padding:13px;border-radius:12px;border:none;font-size:15px;cursor:pointer;font-weight:600}
.btn-edit{background:var(--c0);color:#fff}
.btn-delete{background:rgba(255,255,255,.08);color:var(--c3)}
.form-overlay{position:fixed;inset:0;z-index:60;background:var(--bg);display:none;flex-direction:column;overflow-y:auto}
.form-overlay.active{display:flex}
.form-header{background:var(--c0);color:#fff;padding:10px 16px;padding-top:max(10px,var(--sT));flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.form-header button{background:none;border:none;color:#fff;font-size:16px;cursor:pointer}
.form-header span{font-weight:700;font-size:16px}
.form-body{flex:1;padding:16px;overflow-y:auto}
.form-body label{display:block;font-size:12px;font-weight:700;color:var(--text2);margin:14px 0 6px}
.form-body label:first-child{margin-top:0}
.form-body input[type=text],.form-body select{width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:12px;font-size:15px;background:var(--surface);outline:none;color:var(--text)}
.form-body input[type=text]:focus,.form-body select:focus{border-color:var(--c0)}
.form-body input[type=text]::placeholder{color:var(--text2)}
.form-body input[type=file]{margin-top:8px;font-size:14px;color:var(--text)}
.img-preview{width:100%;max-height:200px;object-fit:contain;border-radius:var(--radius);margin-top:8px;background:#F5F0EB;display:none}
.piece-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;padding:10px;background:var(--surface);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.02)}
.piece-row .slot-icon-wrap{width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--c1);border-radius:8px;color:var(--c0)}
.piece-row select{width:72px;flex-shrink:0;font-size:13px;padding:10px 4px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);outline:none}
.piece-row select:focus{border-color:var(--c0)}
.piece-row input{flex:1;min-width:60px;font-size:14px;padding:10px 12px;border:2px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);outline:none}
.piece-row input:focus{border-color:var(--c0)}
.piece-row input::placeholder{color:var(--text2)}
.piece-row .btn-rm{background:none;border:none;color:var(--c3);font-size:20px;cursor:pointer;padding:2px 6px;flex-shrink:0}
.ac-wrap{position:relative;flex:1;min-width:60px}
.ac-dd{display:none;position:absolute;top:100%;left:0;right:0;z-index:10;background:var(--surface);border:2px solid var(--border);border-radius:10px;max-height:150px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.04)}
.ac-dd.show{display:block}
.ac-dd .ac-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid #F5EFE8}
.ac-dd .ac-item:last-child{border-bottom:none}
.ac-dd .ac-item:active{background:#FFF9F5}
.btn-add-piece{padding:12px;border:2px dashed var(--c5);border-radius:12px;background:none;color:var(--c0);font-size:14px;cursor:pointer;margin-top:8px;font-weight:600;display:block;width:100%}
.btn-save{width:100%;padding:15px;background:var(--c0);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;margin-top:18px;margin-bottom:var(--sB)}
.crop-overlay{position:fixed;inset:0;z-index:80;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;touch-action:none}
.crop-overlay.active{display:flex}
.crop-overlay canvas{max-width:100vw;max-height:70vh;touch-action:none}
.crop-tools{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.crop-tools button{padding:10px 18px;border-radius:20px;border:none;font-size:14px;cursor:pointer;font-weight:600}
.crop-btn-land{background:var(--c0);color:#fff}
.crop-btn-port{background:var(--c4);color:var(--text)}
.crop-btn-done{background:#fff;color:var(--text)}
.crop-hint{color:#fff;font-size:12px;opacity:.5;text-align:center;margin-top:8px}
.fab{position:fixed;right:20px;bottom:calc(20px + var(--sB));width:56px;height:56px;border-radius:50%;border:none;background:var(--c0);color:#fff;font-size:28px;box-shadow:0 6px 18px rgba(168,216,185,.4);cursor:pointer;z-index:20;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.fab:active{transform:scale(.9)}
.fab svg{width:26px;height:26px}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.install-banner{display:none;position:fixed;bottom:calc(84px + var(--sB));left:16px;right:16px;background:var(--surface);border-radius:var(--radius);box-shadow:0 6px 20px rgba(0,0,0,.08);padding:16px;z-index:30;align-items:center;gap:12px;border:2px solid var(--c1)}
.install-banner.show{display:flex}
.install-banner .ib-text{flex:1;font-size:14px}
.install-banner button{padding:9px 18px;border-radius:20px;border:none;background:var(--c0);color:#fff;font-size:14px;cursor:pointer;white-space:nowrap;font-weight:600}
.install-banner .ib-close{background:none;color:var(--text2);font-size:20px;padding:4px}
.confirm-overlay{position:fixed;inset:0;z-index:150;background:rgba(0,0,0,.3);display:none;align-items:center;justify-content:center}
.confirm-overlay.active{display:flex}
.confirm-dialog{background:var(--surface);border-radius:18px;padding:24px;max-width:300px;width:90%;text-align:center}
.confirm-dialog p{margin-bottom:20px;font-size:15px;line-height:1.5;color:var(--text)}
.confirm-btns{display:flex;gap:10px}
.confirm-btns button{flex:1;padding:11px;border-radius:12px;border:none;font-size:15px;cursor:pointer;font-weight:600}
.btn-cancel{background:#F0EBE6;color:var(--text)}
.btn-ok{background:var(--c3);color:#fff}
</style>
</head>
<body>
<div id="app">
<div class="header"><h1>洛克收集簿</h1></div>
<div class="tabs">
<button class="tab active" data-tab="home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>首页</button>
<button class="tab" data-tab="fashion"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="8" height="8" rx="1"/><rect x="14" y="3" width="8" height="8" rx="1"/><rect x="2" y="14" width="8" height="8" rx="1"/><rect x="14" y="14" width="8" height="8" rx="1"/></svg>时装分组</button>
<button class="tab" data-tab="cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg>购物车</button>
</div>
<div class="search-bar" id="searchBar"><input type="text" id="searchInput" placeholder="搜索服装名…"><button class="btn-clear" id="btnClearSearch">✕</button></div>
<div class="main" id="main"></div>
<button class="fab" id="fab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
</div>
<div class="cart-sidebar" id="cartSidebar"><button class="cart-badge" id="cartBadge"><span class="cb-count" id="cartCount">0</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"/></svg></button></div>
<div class="cart-panel" id="cartPanel"><div class="cart-panel-header"><button id="cartPanelBack">← 返回</button><h2>购物车</h2></div><div class="cart-panel-body" id="cartPanelBody"></div><div class="cart-panel-footer">继续浏览时装吧</div></div>
<div class="detail-overlay" id="detailOverlay"><button class="detail-close" id="detailClose">✕</button><img class="detail-img" id="detailImg" src="" alt=""><div class="detail-info"><div class="date" id="detailDate"></div><div class="pieces" id="detailPieces"></div></div><div class="detail-actions"><button class="btn-edit" id="detailEdit">✏️ 编辑</button><button class="btn-delete" id="detailDelete">🗑 删除</button></div></div>
<div class="form-overlay" id="formOverlay"><div class="form-header"><button id="formCancel">取消</button><span id="formTitle">添加搭配</span><button id="formSubmit" style="font-weight:700">保存</button></div><div class="form-body"><label>📷 游戏截图</label><input type="file" accept="image/*" id="formImageInput"><img class="img-preview" id="formImgPreview" src="" alt=""><label>🧩 部件列表</label><div id="formPieces"></div><button class="btn-add-piece" id="btnAddPiece">+ 添加部件</button><button class="btn-save" id="btnSaveForm">💾 保存搭配</button></div></div>
<div class="form-overlay" id="pikaFormOverlay"><div class="form-header" style="background:var(--c7)"><button id="pikaFormCancel">取消</button><span>添加皮卡时装</span><button id="pikaFormSubmit" style="font-weight:700">添加</button></div><div class="form-body"><div class="form-mini"><label>时装名称</label><input type="text" id="pikaName" placeholder="如: 草莓甜心"><label>品质</label><select id="pikaQuality"><option value="金色">金色</option><option value="紫色">紫色</option></select><label>图片（可选）</label><input type="file" accept="image/*" id="pikaImage"><button style="width:100%;padding:14px;background:var(--c7);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;margin-top:10px;cursor:pointer" id="pikaDoAdd">💾 添加到列表</button></div></div></div>

function startCrop(file,ratio,mode,ok){
  st.cropFile=file;st.cropRes=ok;st.cropMode=mode;st.cropRatio=ratio||16/9;st.cropScale=1;st.cropOffX=0;st.cropOffY=0;

    else{$("#cropTools").style.display="flex";$("#cropHint").textContent="选择尺寸后点确认"}

}
function initCropPos(){var img=st.cropImg,scale=Math.min(st.boxW/img.width,st.boxH/img.height);st.cropScale=scale;st.cropOffX=(window.innerWidth-img.width*scale)/2;st.cropOffY=(window.innerHeight*(st.cropMode?.65:.7)-img.height*scale)/2}
function drawCrop(){var cvs=$("#cropCanvas"),ctx=cvs.getContext("2d"),img=st.cropImg,cw=cvs.width,ch=cvs.height;ctx.fillStyle="#000";ctx.fillRect(0,0,cw,ch);var dw=img.width*st.cropScale,dh=img.height*st.cropScale;ctx.drawImage(img,st.cropOffX,st.cropOffY,dw,dh);var boxX=(cw-st.boxW)/2,boxY=(ch-st.boxH)/2;if(st.cropMode){ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(0,0,cw,ch);ctx.save();ctx.beginPath();ctx.rect(boxX,boxY,st.boxW,st.boxH);ctx.clip();ctx.drawImage(img,st.cropOffX,st.cropOffY,dw,dh);ctx.restore();ctx.setLineDash([8,6]);ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.strokeRect(boxX,boxY,st.boxW,st.boxH);ctx.setLineDash([])}else{ctx.fillStyle="rgba(0,0,0,.5)";ctx.fillRect(0,0,cw,ch);ctx.clearRect(boxX,boxY,st.boxW,st.boxH);ctx.drawImage(img,st.cropOffX,st.cropOffY,dw,dh,boxX,boxY,st.boxW,st.boxH);ctx.strokeStyle="#fff";ctx.lineWidth=2;ctx.strokeRect(boxX,boxY,st.boxW,st.boxH)}}

function bindCropEv(){
  var cvs=$("#cropCanvas"),drag=false,lx=0,ly=0,lastDist=0;
  function gd(t){var dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy)}
  cvs.addEventListener("touchstart",function(e){if(st.cropMode&&e.touches.length>=2){lastDist=gd(e.touches);drag=false}else{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY}e.preventDefault()});
  cvs.addEventListener("touchmove",function(e){
    if(st.cropMode&&e.touches.length>=2&&lastDist>0){
      var nd=gd(e.touches),scl=Math.max(.3,Math.min(3,st.cropScale*(lastDist/nd)));
      var boxX=(window.innerWidth-st.boxW)/2,boxY=(window.innerHeight*.65-st.boxH)/2;
      var imgCX=boxX+st.boxW/2,imgCY=boxY+st.boxH/2;
      st.cropOffX=imgCX-(imgCX-st.cropOffX)*(scl/st.cropScale);st.cropOffY=imgCY-(imgCY-st.cropOffY)*(scl/st.cropScale);
      st.cropScale=scl;lastDist=nd;drawCrop();
    }else if(drag){st.cropOffX-=e.touches[0].clientX-lx;st.cropOffY-=e.touches[0].clientY-ly;lx=e.touches[0].clientX;ly=e.touches[0].clientY;drawCrop()}e.preventDefault()});

function setCropRatio(r){st.cropRatio=r;var mw=window.innerWidth,mh=window.innerHeight*(st.cropMode?.65:.7),pw=mw,ph=pw/r;if(ph>mh){ph=mh;pw=ph*r}st.boxW=pw;st.boxH=ph;initCropPos();drawCrop()}
function applyCrop(){
  var img=st.cropImg,boxX=(window.innerWidth-st.boxW)/2,boxY=(window.innerHeight*(st.cropMode?.65:.7)-st.boxH)/2;
  var srcX=(boxX-st.cropOffX)/st.cropScale,srcY=(boxY-st.cropOffY)/st.cropScale;
  var srcW=st.boxW/st.cropScale,srcH=st.boxH/st.cropScale;
  srcX=Math.max(0,Math.min(img.width-srcW,srcX));srcY=Math.max(0,Math.min(img.height-srcH,srcY));
  var c=document.createElement("canvas");c.width=srcW;c.height=srcH;
  c.getContext("2d").drawImage(img,srcX,srcY,srcW,srcH,0,0,srcW,srcH);

function cartCount(){return cart.length}function updateCartBadge(){$("#cartCount").textContent=cartCount()}function isInCart(pid){return cart.some(function(x){return x.id===pid})}
function renderCart(){$("#fab").style.display="none";$("#cartSidebar").style.display="none";var cw=document.getElementById("cw");if(cw)cw.remove();var main=$("#main"),html='<div class="cart-wrap">';html+='<div class="cart-add-bar"><button id="btnAddPika">+ 添加皮卡时装</button><span style="font-size:12px;color:var(--text2);margin-left:auto">共 '+pika.length+" 款</span></div>";html+='<div class="cart-list">';pika.forEach(function(p){var inCart=isInCart(p.id);html+='<div class="cart-row-h"><div class="cr-img" data-pid="'+p.id+'">';if(p.imageBlob){html+='<img src="'+bu(p.imageBlob)+'" alt="">'}else{html+='<span class="cr-plus">+</span>'}html+='</div><div class="cr-info"><div class="cr-name">'+esc(p.name)+"</div><div class='cr-meta'><button class='ci-quality-toggle "+(p.quality==="金色"?"ci-quality-gold":"ci-quality-purple")+"' data-pid='"+p.id+"'>"+(p.quality==="金色"?"✦ 金色":"◇ 紫色")+"</button></div></div><button class='cr-buy"+(inCart?" in-cart":"")+"' data-pid='"+p.id+"'>"+(inCart?"✓ 已加入":"+ 加入")+"</button></div>"});html+="</div></div>";main.innerHTML=html;document.getElementById("btnAddPika").onclick=function(){$("#pikaFormOverlay").classList.add("active")};main.querySelectorAll(".cr-buy").forEach(function(btn){btn.onclick=function(){toggleCart(this.dataset.pid,this)}});main.querySelectorAll(".cr-img").forEach(function(el){el.onclick=function(){addPikaImage(this.dataset.pid)}});main.querySelectorAll(".ci-quality-toggle").forEach(function(el){el.onclick=function(){var pid=this.dataset.pid;var p=pika.find(function(x){return x.id===pid});if(!p)return;p.quality=p.quality==="金色"?"紫色":"金色";dbPut("pika",p);renderCart();toast("已切换为"+(p.quality==="金色"?"金色 ✦":"紫色 ◇"))}})}
function toggleCart(pid,btn){if(isInCart(pid)){cart=cart.filter(function(x){return x.id!==pid});dbDel("pikaCart",pid);if(btn){btn.textContent="+ 加入";btn.classList.remove("in-cart")}}else{var p=pika.find(function(x){return x.id===pid});if(!p)return;var ci={id:p.id,name:p.name,quality:p.quality,imageBlob:p.imageBlob||null};cart.push(ci);dbPut("pikaCart",ci);if(btn){btn.textContent="✓ 已加入";btn.classList.add("in-cart")}}updateCartBadge()}
function openCartPanel(){var body=$("#cartPanelBody"),html="";if(!cart.length){html='<div class="empty"><p>购物车是空的</p><p>去购物车标签页添加皮卡时装吧</p></div>'}else{cart.forEach(function(c){html+='<div class="cart-row">';if(c.imageBlob){html+='<img src="'+bu(c.imageBlob)+'" alt="" style="width:48px;height:48px;object-fit:cover">'}else{html+='<span style="width:48px;height:48px;display:flex;align-items:center;justify-content:center;background:#F5F0EB;border-radius:8px;font-size:22px;color:rgba(0,0,0,.15)">+</span>'}html+='<span class="cr-name">'+esc(c.name)+' <span style="font-size:11px;color:var(--text2)">'+(c.quality==="金色"?"✦金色":"◇紫色")+"</span></span>";html+='<button class="cr-del" data-pid="'+c.id+'">🗑</button></div>'})}body.innerHTML=html;body.querySelectorAll(".cr-del").forEach(function(b){b.onclick=function(){cart=cart.filter(function(x){return x.id!==b.dataset.pid});dbDel("pikaCart",b.dataset.pid);updateCartBadge();openCartPanel()}});$("#cartPanel").classList.add("active");document.body.style.overflow="hidden"}function closeCartPanel(){$("#cartPanel").classList.remove("active");document.body.style.overflow=""}

// ═══════ IMPORT/EXPORT ═══════
function b64(b){return new Promise(function(ok,fail){var r=new FileReader();r.onload=function(){ok(r.result)};r.onerror=fail;r.readAsDataURL(b)})}
function b2b(b64){var parts=b64.split(","),mime=parts[0].match(/:(.*?);/)[1],bytes=atob(parts[1]),arr=new Uint8Array(bytes.length);for(var i=0;i<bytes.length;i++)arr[i]=bytes.charCodeAt(i);return new Blob([arr],{type:mime})}
function exportData(){if(!all.length){toast("没有数据可导出");return}toast("正在导出…");var ps=all.map(function(o){return Promise.all([b64(o.image),b64(o.thumbnail)]).then(function(p){return{id:o.id,createdAt:o.createdAt,pieces:o.pieces,imageBase64:p[0],thumbBase64:p[1],imageWidth:o.imageWidth||0,imageHeight:o.imageHeight||0}})});Promise.all(ps).then(function(data){var json=JSON.stringify({version:1,exportedAt:Date.now(),count:data.length,data:data}),blob=new Blob([json],{type:"application/json"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="luoke-"+fd(Date.now())+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast("导出成功 📤")}).catch(function(e){toast("导出失败: "+e.message)})}
function importData(){var inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.addEventListener("change",function(){var file=this.files[0];if(!file)return;file.text().then(function(text){var json=JSON.parse(text);if(!json.data||!Array.isArray(json.data))throw new Error("无效备份");toast("正在导入 "+json.data.length+" 条…");var chain=Promise.resolve();json.data.forEach(function(item){chain=chain.then(function(){return new Promise(function(ok2){var t=db.transaction("outfits","readonly"),r=t.objectStore("outfits").get(item.id);r.onsuccess=function(){ok2(r.result)};r.onerror=function(){ok2(null)}})}).then(function(ex){if(ex)return;return dbPut("outfits",{id:item.id,createdAt:item.createdAt,pieces:item.pieces||[],image:b2b(item.imageBase64),thumbnail:b2b(item.thumbBase64||item.imageBase64),imageWidth:item.imageWidth||0,imageHeight:item.imageHeight||0})})});chain.then(function(){refresh().then(function(){renderHome();toast("导入完成 🎉")})})}).catch(function(e){toast("导入失败: "+e.message)})});inp.click()}
