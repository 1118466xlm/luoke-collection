<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Diemo silhouette, centered, ears fully within circle -->
  <circle cx="256" cy="256" r="240" fill="#A8D8B9"/>
  <circle cx="256" cy="256" r="226" fill="none" stroke="#7EC09E" stroke-width="3"/>
  <g transform="translate(256,260)" fill="#FFF" opacity="0.92">
    <!-- Body (round/chubby) -->
    <ellipse cx="0" cy="0" rx="77" ry="70"/>
    <!-- Head -->
    <circle cx="0" cy="-90" r="63"/>
    <!-- Left ear (tall/pointy, shortened to fit circle) -->
    <path d="M-42,-128 C-55,-190 -20,-210 -16,-138 Z"/>
    <!-- Right ear -->
    <path d="M42,-128 C55,-190 20,-210 16,-138 Z"/>
    <!-- Left eye -->
    <ellipse cx="-20" cy="-95" rx="9" ry="13" fill="#A8D8B9"/>
    <!-- Right eye -->
    <ellipse cx="20" cy="-95" rx="9" ry="13" fill="#A8D8B9"/>
    <!-- Mouth (slight smile) -->
    <path d="M-13,-68 Q0,-55 13,-68" fill="none" stroke="#A8D8B9" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Left arm -->
    <ellipse cx="-78" cy="-3" rx="20" ry="30" transform="rotate(20,-78,-3)"/>
    <!-- Right arm -->
    <ellipse cx="78" cy="-3" rx="20" ry="30" transform="rotate(-20,78,-3)"/>
    <!-- Left foot -->
    <ellipse cx="-36" cy="68" rx="25" ry="16"/>
    <!-- Right foot -->
    <ellipse cx="36" cy="68" rx="25" ry="16"/>
    <!-- Belly patch -->
    <ellipse cx="0" cy="5" rx="40" ry="36" fill="#A8D8B9" opacity="0.45"/>
  </g>
</svg>
