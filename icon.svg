<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- wardrobe body -->
  <rect x="56" y="24" width="400" height="464" rx="32" fill="#7EC8A3"/>
  <!-- left door (closed) -->
  <rect x="72" y="40" width="176" height="440" rx="12" fill="#5DAB86"/>
  <!-- right door (half open) -->
  <path d="M264 40l160 0c9 0 16 7 16 16v384c0 9-7 16-16 16H264V40z" fill="#5DAB86" transform="skewY(0) scale(0.62,1) translate(146,0)"/>
  <!-- clothes inside (visible through gap) -->
  <g stroke="#FFF" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9">
    <!-- hanger 1 -->
    <line x1="274" y1="60" x2="274" y2="48"/>
    <path d="M254 60h40"/><path d="M274 60l-15 30m15-30l15 30"/>
    <!-- hanger 2 -->
    <line x1="288" y1="80" x2="288" y2="68"/>
    <path d="M270 80h36"/><path d="M288 80l-12 25m12-25l12 25"/>
    <!-- hanger 3 -->
    <line x1="278" y1="100" x2="278" y2="88"/>
    <path d="M262 100h32"/><path d="M278 100l-10 20m10-20l10 20"/>
  </g>
  <!-- left door panel line -->
  <line x1="160" y1="40" x2="160" y2="480" stroke="#7EC8A3" stroke-width="2"/>
  <!-- handles -->
  <circle cx="149" cy="260" r="8" fill="#FFF" opacity="0.6"/>
  <circle cx="396" cy="260" r="8" fill="#FFF" opacity="0.6"/>
</svg>
