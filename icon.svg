<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4C2C2"/>
      <stop offset="30%" stop-color="#FFFBF7"/>
      <stop offset="60%" stop-color="#FAD4C0"/>
      <stop offset="100%" stop-color="#CDC0E0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="92" fill="url(#bg)"/>
  <!-- notebook/journal -->
  <g transform="translate(256,270)">
    <!-- notebook cover -->
    <rect x="-140" y="-170" width="280" height="340" rx="12" fill="#FFF" opacity="0.9"/>
    <!-- spine -->
    <rect x="-140" y="-170" width="16" height="340" rx="4" fill="#FAD4C0" opacity="0.8"/>
    <!-- pages visible on right edge -->
    <rect x="132" y="-162" width="10" height="324" rx="2" fill="#FFFBF7" opacity="0.6"/>
    <rect x="128" y="-158" width="8" height="320" rx="2" fill="#FFFDF9" opacity="0.5"/>
    <!-- horizontal lines (writing lines) -->
    <g stroke="#E8E0D5" stroke-width="2" opacity="0.5">
      <line x1="-100" y1="-120" x2="110" y2="-120"/>
      <line x1="-100" y1="-80" x2="110" y2="-80"/>
      <line x1="-100" y1="-40" x2="110" y2="-40"/>
      <line x1="-100" y1="0" x2="110" y2="0"/>
      <line x1="-100" y1="40" x2="110" y2="40"/>
      <line x1="-100" y1="80" x2="110" y2="80"/>
      <line x1="-100" y1="120" x2="80" y2="120"/>
    </g>
    <!-- ribbon bookmark -->
    <path d="M-20,-170 L-20,-120 L0,-130 L20,-120 L20,-170" fill="#F4C2C2" opacity="0.7"/>
    <!-- pen/pencil on the right -->
    <g transform="rotate(-30,100,-50)">
      <rect x="105" y="-160" width="10" height="120" rx="3" fill="#FBE0C8" opacity="0.8"/>
      <polygon points="105,-40 110,-20 115,-40" fill="#FAD4C0" opacity="0.8"/>
    </g>
  </g>
</svg>
